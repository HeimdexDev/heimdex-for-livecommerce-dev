  drive-blur-worker:
    # User-triggered PII blur (face + OWLv2). Off by default — enable
    # with `docker compose --profile blur up drive-blur-worker`. Runs on
    # Aircloud GPU in staging/prod; locally requires an NVIDIA GPU or
    # BLUR_ALLOW_CPU=true (CPU mode is painfully slow, test-only).
    profiles: ["blur"]
    build:
      context: ..
      dockerfile: dev-heimdex-for-livecommerce/services/drive-blur-worker/Dockerfile.gpu
    container_name: heimdex-drive-blur-worker
    mem_limit: 8g
    cpus: "4.0"
    environment:
      - PYTHONPATH=/app
      - MINIO_ENDPOINT=${MINIO_ENDPOINT-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heimdex}
