        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      sh -c "pip install --no-deps -e /opt/heimdex-media-contracts 2>/dev/null;
             pip install --no-deps -e /opt/heimdex-media-pipelines 2>/dev/null;
             python -m src.worker"


  bgutil-provider:
    profiles: ["youtube"]
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: heimdex-bgutil-provider
    mem_limit: 512m
    restart: unless-stopped
    environment:
      - TOKEN_TTL=${BGUTIL_TOKEN_TTL:-21600}
    ports:
      - "127.0.0.1:4416:4416"

  youtube-worker:
    profiles: ["youtube"]
    build:
      context: .
      dockerfile: services/youtube-worker/Dockerfile
    container_name: heimdex-youtube-worker
    mem_limit: 2g
    cpus: "2.0"
    environment:
      - PYTHONPATH=/app
      - YOUTUBE_ENABLED=${YOUTUBE_ENABLED:-false}
      - YOUTUBE_ORG_ID=${YOUTUBE_ORG_ID:-}
      - YOUTUBE_COOKIES_PATH=${YOUTUBE_COOKIES_PATH:-}
      - YOUTUBE_POT_PROVIDER_URL=${YOUTUBE_POT_PROVIDER_URL:-http://bgutil-provider:4416}
      - YOUTUBE_S3_BUCKET=${YOUTUBE_S3_BUCKET:-}
      - YOUTUBE_SYNC_INTERVAL_SECONDS=${YOUTUBE_SYNC_INTERVAL_SECONDS:-21600}
      - YOUTUBE_DOWNLOAD_FORMAT=${YOUTUBE_DOWNLOAD_FORMAT:-bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720]}
      - YOUTUBE_RATE_LIMIT_SLEEP=${YOUTUBE_RATE_LIMIT_SLEEP:-3}
      - YOUTUBE_RATE_LIMIT_MAX_SLEEP=${YOUTUBE_RATE_LIMIT_MAX_SLEEP:-8}
      - YOUTUBE_MAX_CONCURRENT_DOWNLOADS=${YOUTUBE_MAX_CONCURRENT_DOWNLOADS:-2}
      - YOUTUBE_AUTO_DELETE_ORIGINALS=${YOUTUBE_AUTO_DELETE_ORIGINALS:-true}
      - YOUTUBE_ORIGINAL_TTL_DAYS=${YOUTUBE_ORIGINAL_TTL_DAYS:-7}
      - DRIVE_API_BASE_URL=${DRIVE_API_BASE_URL:-http://api:8000}
      - DRIVE_INTERNAL_API_KEY=${DRIVE_INTERNAL_API_KEY:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-heimdex-drive}
      - S3_REGION=${S3_REGION:-ap-northeast-2}
      - SQS_ENABLED=${SQS_ENABLED:-false}
      - SQS_REGION=${SQS_REGION:-ap-northeast-2}
