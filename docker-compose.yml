        - NEXT_PUBLIC_EXPORT_SHORTS_EDITOR_V2_ENABLED=${NEXT_PUBLIC_EXPORT_SHORTS_EDITOR_V2_ENABLED:-false}
    container_name: heimdex-web
    mem_limit: 512m
    cpus: "1.0"
    environment:
      - AGENT_UPDATE_MANIFEST_URL=${AGENT_UPDATE_MANIFEST_URL:-}
      - HOSTNAME=0.0.0.0
    ports:
      - "3000:3000"
    extra_hosts:
      - "devorg.app.heimdex.local:host-gateway"
    depends_on:
      - api

