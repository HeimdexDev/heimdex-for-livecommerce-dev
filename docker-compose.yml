services:
  postgres:
    image: postgres:16-alpine
    container_name: heimdex-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heimdex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heimdex_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-heimdex}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heimdex"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    build:
      context: ./infra/opensearch
      dockerfile: Dockerfile
    image: heimdex-opensearch:2.11.1-nori
    container_name: heimdex-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: heimdex-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-heimdex}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-heimdex_dev_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: heimdex-api
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://heimdex:heimdex_dev_password@postgres:5432/heimdex}
      - DATABASE_URL_SYNC=${DATABASE_URL_SYNC:-postgresql://heimdex:heimdex_dev_password@postgres:5432/heimdex}
      - OPENSEARCH_URL=http://opensearch:9200
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heimdex}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-heimdex_dev_password}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*.app.heimdex.local,localhost}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-true}
      - AUTH_COOKIE_SAMESITE=${AUTH_COOKIE_SAMESITE:-lax}
      # Embedding configuration - set EMBEDDING_USE_MOCK=false for real semantic search
      - EMBEDDING_MODEL=intfloat/multilingual-e5-large
      - EMBEDDING_DIMENSION=1024
      - EMBEDDING_DEVICE=cpu
      - EMBEDDING_USE_MOCK=${EMBEDDING_USE_MOCK:-true}
      # Auth0 configuration
      - AUTH0_ENABLED=${AUTH0_ENABLED:-false}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-your-tenant.auth0.com}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-https://api.heimdex.io}
      - AUTH0_ORG_CLAIM=${AUTH0_ORG_CLAIM:-https://heimdex.io/org_id}
      - AUTH0_ALGORITHMS=${AUTH0_ALGORITHMS:-RS256}
      # Agent configuration
      - AGENT_INGEST_ENABLED=${AGENT_INGEST_ENABLED:-true}
      - AGENT_API_KEY=${AGENT_API_KEY:-dev-agent-key-change-in-production}
      - AGENT_API_KEY_MODE=${AGENT_API_KEY_MODE:-global}
      - AGENT_INGEST_MAX_SCENES=${AGENT_INGEST_MAX_SCENES:-500}
      - AGENT_INGEST_MAX_TRANSCRIPT_CHARS=${AGENT_INGEST_MAX_TRANSCRIPT_CHARS:-50000}
      - DEVICE_SECRET_PEPPER=${DEVICE_SECRET_PEPPER:-dev-device-pepper-change-in-production}
      - PAIRING_CODE_TTL_MINUTES=${PAIRING_CODE_TTL_MINUTES:-10}
      - AGENT_INTENTS_ENABLED=${AGENT_INTENTS_ENABLED:-true}
      - AGENT_INTENT_TTL_MINUTES=${AGENT_INTENT_TTL_MINUTES:-10}
      - AGENT_INTENT_MAX_PER_ORG=${AGENT_INTENT_MAX_PER_ORG:-10}
      - AGENT_INTENT_EXCHANGE_MAX_ATTEMPTS=${AGENT_INTENT_EXCHANGE_MAX_ATTEMPTS:-5}
      # Ingest safety
      - INGEST_REQUIRE_TIMESTAMP=${INGEST_REQUIRE_TIMESTAMP:-false}
      - INGEST_TIMESTAMP_SKEW_SECONDS=${INGEST_TIMESTAMP_SKEW_SECONDS:-300}
      - INGEST_REQUIRE_IDEMPOTENCY=${INGEST_REQUIRE_IDEMPOTENCY:-false}
      - INGEST_IDEMPOTENCY_TTL_SECONDS=${INGEST_IDEMPOTENCY_TTL_SECONDS:-600}
      # Dev features
      - ENABLE_DEV_REFRESH=${ENABLE_DEV_REFRESH:-true}
      # HuggingFace model cache directory (persists downloaded models)
      - HF_HOME=/root/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
      # Mount heimdex-media-contracts for runtime import (shorts scorer, scene schemas)
      - ../heimdex-media-contracts:/opt/heimdex-media-contracts:ro
      # Persistent volume for HuggingFace model cache (~2.4GB for multilingual-e5-large)
      - huggingface_cache:/root/.cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: >
      sh -c "pip install --no-deps -e /opt/heimdex-media-contracts 2>/dev/null;
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
    container_name: heimdex-web
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://devorg.app.heimdex.local:8000}
      - NEXT_PUBLIC_AUTH0_ENABLED=${NEXT_PUBLIC_AUTH0_ENABLED:-false}
      - NEXT_PUBLIC_AUTH0_DOMAIN=${NEXT_PUBLIC_AUTH0_DOMAIN:-your-tenant.auth0.com}
      - NEXT_PUBLIC_AUTH0_CLIENT_ID=${NEXT_PUBLIC_AUTH0_CLIENT_ID:-your-client-id}
      - NEXT_PUBLIC_AUTH0_AUDIENCE=${NEXT_PUBLIC_AUTH0_AUDIENCE:-https://api.heimdex.io}
    ports:
      - "3000:3000"
    volumes:
      - ./services/web:/app
      - /app/node_modules
      - /app/.next
    extra_hosts:
      - "devorg.app.heimdex.local:host-gateway"
    depends_on:
      - api

  face-worker:
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    container_name: heimdex-face-worker
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./services/worker:/app
      - ./data:/data
      - ./artifacts/face:/app/artifacts
      - ./.insightface:/root/.insightface
    command: ["sleep", "infinity"]

volumes:
  postgres_data:
  opensearch_data:
  minio_data:
  huggingface_cache:
