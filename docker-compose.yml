      api:
        condition: service_healthy
      bgutil-provider:
        condition: service_started
    command: >
      sh -c "python -m src.worker"

  shorts-render-worker:
    build:
      context: .
      dockerfile: services/shorts-render-worker/Dockerfile
    container_name: heimdex-shorts-render-worker
    environment:
      - PYTHONPATH=/app
      - SQS_CONSUMER_ENABLED=${SQS_CONSUMER_ENABLED:-true}
      - SQS_SHORTS_RENDER_QUEUE_URL=${SQS_SHORTS_RENDER_QUEUE_URL:-}
      - SQS_ENDPOINT_URL=${SQS_ENDPOINT_URL:-}
      - SQS_REGION=${SQS_REGION:-ap-northeast-2}
      - DRIVE_API_BASE_URL=http://api:8000
      - DRIVE_INTERNAL_API_KEY=${DRIVE_INTERNAL_API_KEY:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heimdex}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-heimdex_dev_password}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-heimdex-drive}
      - FONT_DIR=/usr/share/fonts/heimdex
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Mount pipeline repos (same pattern as drive-worker)
      - ../heimdex-media-contracts:/opt/heimdex-media-contracts:ro
      - ../heimdex-media-pipelines:/opt/heimdex-media-pipelines:ro
    depends_on:
      api:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped
    command: >
      sh -c "pip install --no-deps /opt/heimdex-media-contracts 2>/dev/null;
             pip install --no-deps /opt/heimdex-media-pipelines 2>/dev/null;
             python -m src.worker"

  # NOTE (2026-02-26): elasticmq is for LOCAL DEV SQS simulation only.
  # Staging/prod uses real AWS SQS (ap-northeast-2). Not needed on EC2.
  # Guarded by profiles: ["local-dev"] â€” requires --profile local-dev to start.
  elasticmq:
    profiles: ["local-dev"]
    image: softwaremill/elasticmq-native:latest
    container_name: heimdex-elasticmq
    mem_limit: 256m
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf

