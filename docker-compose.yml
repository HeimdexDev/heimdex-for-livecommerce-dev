services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: heimdex-postgres
    mem_limit: 1g
    cpus: "2.0"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heimdex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heimdex_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-heimdex}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heimdex"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    build:
      context: ./infra/opensearch
      dockerfile: Dockerfile
    image: heimdex-opensearch:2.11.1-nori
    container_name: heimdex-opensearch
    mem_limit: 1g
    cpus: "2.0"
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: heimdex-minio
    mem_limit: 512m
    cpus: "1.0"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-heimdex}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-heimdex_dev_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: heimdex-api
    mem_limit: 6g  # Increased from 4g for SigLIP2 text encoder (~200MB BF16) alongside E5-large
    cpus: "4.0"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://heimdex:heimdex_dev_password@postgres:5432/heimdex}
      - DATABASE_URL_SYNC=${DATABASE_URL_SYNC:-postgresql://heimdex:heimdex_dev_password@postgres:5432/heimdex}
      - OPENSEARCH_URL=${OPENSEARCH_URL:-http://opensearch:9200}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heimdex}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-heimdex_dev_password}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*.app.heimdex.local,localhost}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-true}
      - AUTH_COOKIE_SAMESITE=${AUTH_COOKIE_SAMESITE:-lax}
      # Embedding configuration - set EMBEDDING_USE_MOCK=false for real semantic search
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:-cpu}
      - EMBEDDING_USE_MOCK=${EMBEDDING_USE_MOCK:-true}
      # Auth0 configuration
      - AUTH0_ENABLED=${AUTH0_ENABLED:-false}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-https://api.heimdex.io}
      - AUTH0_ORG_CLAIM=${AUTH0_ORG_CLAIM:-https://heimdex.io/org_id}
      - AUTH0_ALGORITHMS=${AUTH0_ALGORITHMS:-RS256}
      # Agent configuration
      - AGENT_INGEST_ENABLED=${AGENT_INGEST_ENABLED:-true}
      - AGENT_API_KEY=${AGENT_API_KEY:-dev-agent-key-change-in-production}
      - AGENT_API_KEY_MODE=${AGENT_API_KEY_MODE:-global}
      - AGENT_INGEST_MAX_SCENES=${AGENT_INGEST_MAX_SCENES:-500}
      - AGENT_INGEST_MAX_TRANSCRIPT_CHARS=${AGENT_INGEST_MAX_TRANSCRIPT_CHARS:-50000}
      - DEVICE_SECRET_PEPPER=${DEVICE_SECRET_PEPPER:-dev-device-pepper-change-in-production}
      - PAIRING_CODE_TTL_MINUTES=${PAIRING_CODE_TTL_MINUTES:-10}
      - AGENT_INTENTS_ENABLED=${AGENT_INTENTS_ENABLED:-true}
      - AGENT_INTENT_TTL_MINUTES=${AGENT_INTENT_TTL_MINUTES:-10}
      - AGENT_INTENT_MAX_PER_ORG=${AGENT_INTENT_MAX_PER_ORG:-10}
      - AGENT_INTENT_EXCHANGE_MAX_ATTEMPTS=${AGENT_INTENT_EXCHANGE_MAX_ATTEMPTS:-5}
      # Ingest safety
      - INGEST_REQUIRE_TIMESTAMP=${INGEST_REQUIRE_TIMESTAMP:-false}
      - INGEST_TIMESTAMP_SKEW_SECONDS=${INGEST_TIMESTAMP_SKEW_SECONDS:-300}
      - INGEST_REQUIRE_IDEMPOTENCY=${INGEST_REQUIRE_IDEMPOTENCY:-false}
      - INGEST_IDEMPOTENCY_TTL_SECONDS=${INGEST_IDEMPOTENCY_TTL_SECONDS:-600}
      # SQS queue configuration
      - SQS_ENABLED=${SQS_ENABLED:-false}
      - SQS_ENDPOINT_URL=${SQS_ENDPOINT_URL:-}
      - SQS_REGION=${SQS_REGION:-ap-northeast-2}
      - SQS_PROCESSING_QUEUE_URL=${SQS_PROCESSING_QUEUE_URL:-}
      - SQS_CAPTION_QUEUE_URL=${SQS_CAPTION_QUEUE_URL:-}
      - SQS_STT_QUEUE_URL=${SQS_STT_QUEUE_URL:-}
      - SQS_OCR_QUEUE_URL=${SQS_OCR_QUEUE_URL:-}
      - SQS_TRANSCODE_QUEUE_URL=${SQS_TRANSCODE_QUEUE_URL:-}
      - SQS_FACE_QUEUE_URL=${SQS_FACE_QUEUE_URL:-}
      # GPU transcode mode (cpu=local ffmpeg, gpu=S3+SQS+NVENC)
      - DRIVE_TRANSCODE_MODE=${DRIVE_TRANSCODE_MODE:-cpu}
      # Dev features
      - ENABLE_DEV_REFRESH=${ENABLE_DEV_REFRESH:-true}
      # Drive internal ingest key (shared with drive-worker)
      - DRIVE_CONNECTOR_ENABLED=${DRIVE_CONNECTOR_ENABLED:-false}
      - FOLDER_SYNC_V2_ENABLED=${FOLDER_SYNC_V2_ENABLED:-true}
      - DRIVE_INTERNAL_API_KEY=${DRIVE_INTERNAL_API_KEY:-}
      - DRIVE_SA_ENCRYPTION_KEY=${DRIVE_SA_ENCRYPTION_KEY:-}
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-heimdex-drive}
      - S3_REGION=${S3_REGION:-ap-northeast-2}
      # Google Drive OAuth (folder-scoped sync)
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-}
      # Visual embedding (SigLIP2 query-time text encoder)
      - VISUAL_EMBEDDING_ENABLED=${VISUAL_EMBEDDING_ENABLED:-false}
      - SQS_VISUAL_EMBED_QUEUE_URL=${SQS_VISUAL_EMBED_QUEUE_URL:-}
      - SQS_EXPORT_QUEUE_URL=${SQS_EXPORT_QUEUE_URL:-}
      - SQS_SHORTS_RENDER_QUEUE_URL=${SQS_SHORTS_RENDER_QUEUE_URL:-}
      # Aircloud GPU worker orchestration
      - AIRCLOUD_ENABLED=${AIRCLOUD_ENABLED:-false}
      - AIRCLOUD_API_KEY=${AIRCLOUD_API_KEY:-}
      - AIRCLOUD_ENDPOINT_TRANSCODE=${AIRCLOUD_ENDPOINT_TRANSCODE:-}
      - AIRCLOUD_ENDPOINT_CAPTION=${AIRCLOUD_ENDPOINT_CAPTION:-}
      - AIRCLOUD_ENDPOINT_STT=${AIRCLOUD_ENDPOINT_STT:-}
      - AIRCLOUD_ENDPOINT_OCR=${AIRCLOUD_ENDPOINT_OCR:-}
      - AIRCLOUD_ENDPOINT_FACE=${AIRCLOUD_ENDPOINT_FACE:-}
      - AIRCLOUD_ENDPOINT_VISUAL_EMBED=${AIRCLOUD_ENDPOINT_VISUAL_EMBED:-}
      - AIRCLOUD_WAKE_DEBOUNCE_SECONDS=${AIRCLOUD_WAKE_DEBOUNCE_SECONDS:-300}
      - AIRCLOUD_COOLDOWN_CHECKS=${AIRCLOUD_COOLDOWN_CHECKS:-3}
      # Export settings
      - EXPORT_MAX_SIZE_BYTES=${EXPORT_MAX_SIZE_BYTES:-2147483648}
      - EXPORT_MAX_CLIPS=${EXPORT_MAX_CLIPS:-100}
      - EXPORT_MAX_PROXIES=${EXPORT_MAX_PROXIES:-20}
      - EXPORT_EXPIRY_DAYS=${EXPORT_EXPIRY_DAYS:-3}
      - ANALYTICS_ENABLED=${ANALYTICS_ENABLED:-true}
      - ANALYTICS_EXPORT_ENABLED=${ANALYTICS_EXPORT_ENABLED:-false}
      - ANALYTICS_S3_BUCKET=${ANALYTICS_S3_BUCKET:-}
      - ANALYTICS_S3_PREFIX=${ANALYTICS_S3_PREFIX:-analytics}
      - YOUTUBE_ENABLED=${YOUTUBE_ENABLED:-false}
      - YOUTUBE_S3_BUCKET=${YOUTUBE_S3_BUCKET:-}
      - HF_HOME=/home/appuser/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
      # Mount heimdex-media-contracts for runtime import (shorts scorer, scene schemas)
      - ../heimdex-media-contracts:/opt/heimdex-media-contracts:ro
      # Persistent volume for HuggingFace model cache (~2.4GB for multilingual-e5-large)
      - huggingface_cache:/home/appuser/.cache/huggingface
      # Persistent storage for uploaded scene/face thumbnails
      - ./thumbnails:/data/thumbnails
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: >
      sh -c "pip install --no-deps -e /opt/heimdex-media-contracts 2>/dev/null;
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*' --reload"

  web:
    build:
      context: ./services/web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://devorg.app.heimdex.local:8000}
        - NEXT_PUBLIC_AUTH0_ENABLED=${NEXT_PUBLIC_AUTH0_ENABLED:-false}
        - NEXT_PUBLIC_AUTH0_DOMAIN=${NEXT_PUBLIC_AUTH0_DOMAIN:-}
        - NEXT_PUBLIC_AUTH0_CLIENT_ID=${NEXT_PUBLIC_AUTH0_CLIENT_ID:-}
        - NEXT_PUBLIC_AUTH0_AUDIENCE=${NEXT_PUBLIC_AUTH0_AUDIENCE:-https://api.heimdex.io}
        - NEXT_PUBLIC_AUTH0_ORGANIZATION=${NEXT_PUBLIC_AUTH0_ORGANIZATION:-}
    container_name: heimdex-web
    mem_limit: 512m
    cpus: "1.0"
    environment:
      - AGENT_UPDATE_MANIFEST_URL=${AGENT_UPDATE_MANIFEST_URL:-}
      - HOSTNAME=0.0.0.0
    ports:
      - "3000:3000"
    extra_hosts:
      - "devorg.app.heimdex.local:host-gateway"
    depends_on:
      - api

  # DEPRECATED (2026-02-26): face-worker is dead code â€” never ran in production.
  # Kept for reference only. Removal planned in PR4 (housekeeping).
  face-worker:
    profiles: ["face-dev"]
    build:
      context: ./services/worker
      dockerfile: Dockerfile
    container_name: heimdex-face-worker
    mem_limit: 2g
    cpus: "2.0"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./services/worker:/app
      - ./data:/data
      - ./artifacts/face:/app/artifacts
      - ./.insightface:/root/.insightface
    command: ["sleep", "infinity"]

  drive-worker:
    build:
      context: .
      dockerfile: services/drive-worker/Dockerfile
    container_name: heimdex-drive-worker
    mem_limit: 2g
    cpus: "2.0"
    environment:
      - PYTHONPATH=/app
      - MINIO_ENDPOINT=${MINIO_ENDPOINT-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heimdex}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-heimdex_dev_password}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - DRIVE_CONNECTOR_ENABLED=${DRIVE_CONNECTOR_ENABLED:-false}
      - FOLDER_SYNC_V2_ENABLED=${FOLDER_SYNC_V2_ENABLED:-true}
      - DRIVE_INTERNAL_API_KEY=${DRIVE_INTERNAL_API_KEY:-}
      - DRIVE_API_BASE_URL=http://api:8000
      - DRIVE_WORKER_POLL_INTERVAL_SECONDS=${DRIVE_WORKER_POLL_INTERVAL_SECONDS:-30}
      - DRIVE_WORKER_GLOBAL_CONCURRENCY=${DRIVE_WORKER_GLOBAL_CONCURRENCY:-2}
      - DRIVE_WORKER_PER_ORG_CONCURRENCY=${DRIVE_WORKER_PER_ORG_CONCURRENCY:-1}
      - DRIVE_TEMP_DISK_BUDGET_GB=${DRIVE_TEMP_DISK_BUDGET_GB:-50}
      - DRIVE_TEMP_DIR=/data/drive-tmp
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-heimdex-drive}
      - S3_REGION=${S3_REGION:-ap-northeast-2}
      - DRIVE_PROXY_MAX_HEIGHT=${DRIVE_PROXY_MAX_HEIGHT:-720}
      - DRIVE_PROXY_CRF=${DRIVE_PROXY_CRF:-23}
      - DRIVE_PROXY_PRESET=${DRIVE_PROXY_PRESET:-fast}
      - DRIVE_PROXY_AUDIO_BITRATE=${DRIVE_PROXY_AUDIO_BITRATE:-128k}
      - DRIVE_PROXY_MAX_BITRATE=${DRIVE_PROXY_MAX_BITRATE:-2500k}
      - DRIVE_PROXY_BUFSIZE=${DRIVE_PROXY_BUFSIZE:-5000k}
      - DRIVE_ENRICHMENT_ENABLED=${DRIVE_ENRICHMENT_ENABLED:-false}
      - IMAGE_PROCESSING_ENABLED=${IMAGE_PROCESSING_ENABLED:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # SQS configuration
      - SQS_CONSUMER_ENABLED=${SQS_CONSUMER_ENABLED:-false}
      - SQS_ENDPOINT_URL=${SQS_ENDPOINT_URL:-}
      - SQS_REGION=${SQS_REGION:-ap-northeast-2}
      - SQS_PROCESSING_QUEUE_URL=${SQS_PROCESSING_QUEUE_URL:-}
      - SQS_TRANSCODE_QUEUE_URL=${SQS_TRANSCODE_QUEUE_URL:-}
      - SQS_EXPORT_QUEUE_URL=${SQS_EXPORT_QUEUE_URL:-}
      - EXPORT_MAX_SIZE_BYTES=${EXPORT_MAX_SIZE_BYTES:-2147483648}
      - EXPORT_MAX_CLIPS=${EXPORT_MAX_CLIPS:-100}
      - EXPORT_MAX_PROXIES=${EXPORT_MAX_PROXIES:-20}
      - EXPORT_EXPIRY_DAYS=${EXPORT_EXPIRY_DAYS:-3}
      # GPU transcode mode (cpu=local ffmpeg, gpu=S3+SQS+NVENC)
      - DRIVE_TRANSCODE_MODE=${DRIVE_TRANSCODE_MODE:-cpu}
      # Aircloud GPU worker orchestration
      - AIRCLOUD_ENABLED=${AIRCLOUD_ENABLED:-false}
      - AIRCLOUD_API_KEY=${AIRCLOUD_API_KEY:-}
      - AIRCLOUD_ENDPOINT_TRANSCODE=${AIRCLOUD_ENDPOINT_TRANSCODE:-}
      - AIRCLOUD_ENDPOINT_CAPTION=${AIRCLOUD_ENDPOINT_CAPTION:-}
      - AIRCLOUD_ENDPOINT_STT=${AIRCLOUD_ENDPOINT_STT:-}
      - AIRCLOUD_ENDPOINT_OCR=${AIRCLOUD_ENDPOINT_OCR:-}
      - AIRCLOUD_ENDPOINT_FACE=${AIRCLOUD_ENDPOINT_FACE:-}
      - AIRCLOUD_ENDPOINT_VISUAL_EMBED=${AIRCLOUD_ENDPOINT_VISUAL_EMBED:-}
      - AIRCLOUD_WAKE_DEBOUNCE_SECONDS=${AIRCLOUD_WAKE_DEBOUNCE_SECONDS:-300}
      - AIRCLOUD_COOLDOWN_CHECKS=${AIRCLOUD_COOLDOWN_CHECKS:-3}
      - SQS_CAPTION_QUEUE_URL=${SQS_CAPTION_QUEUE_URL:-}
      - SQS_STT_QUEUE_URL=${SQS_STT_QUEUE_URL:-}
      - SQS_OCR_QUEUE_URL=${SQS_OCR_QUEUE_URL:-}
      - SQS_FACE_QUEUE_URL=${SQS_FACE_QUEUE_URL:-}
      - SQS_VISUAL_EMBED_QUEUE_URL=${SQS_VISUAL_EMBED_QUEUE_URL:-}
    volumes:
      - ./services/drive-worker:/app
      # Mount pipeline repos for scene detection + keyframe extraction (V3a)
      - ../heimdex-media-contracts:/opt/heimdex-media-contracts:ro
      - ../heimdex-media-pipelines:/opt/heimdex-media-pipelines:ro
      - ./data:/data
    depends_on:
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      sh -c "pip install --no-deps -e /opt/heimdex-media-contracts 2>/dev/null;
             pip install --no-deps -e /opt/heimdex-media-pipelines 2>/dev/null;
             python -m src.worker"

  # DEPRECATED (2026-02-26): OCR enrichment worker migrated to Aircloud+ GPU.
  # This CPU service definition is kept for local dev only.
  # Staging/prod uses ghcr.io/jlee-heimdex/heimdex-ocr-worker-gpu:latest on Aircloud+.
  # Guarded by profiles: ["ec2-legacy"] â€” requires --profile ec2-legacy to start.
  drive-ocr-worker:
    profiles: ["ec2-legacy"]
    build:
      context: .
      dockerfile: services/drive-ocr-worker/Dockerfile
    container_name: heimdex-drive-ocr-worker
    mem_limit: 2g
    cpus: "2.0"
    environment:
      - PYTHONPATH=/app
      - MINIO_ENDPOINT=${MINIO_ENDPOINT-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heimdex}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-heimdex_dev_password}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - DRIVE_OCR_ENABLED=${DRIVE_OCR_ENABLED:-false}
      - DRIVE_INTERNAL_API_KEY=${DRIVE_INTERNAL_API_KEY:-}
      - DRIVE_API_BASE_URL=http://api:8000
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-heimdex-drive}
      - S3_REGION=${S3_REGION:-ap-northeast-2}
      - DRIVE_OCR_CONCURRENCY=${DRIVE_OCR_CONCURRENCY:-1}
      - DRIVE_OCR_MAX_FRAMES_PER_SCENE=${DRIVE_OCR_MAX_FRAMES_PER_SCENE:-10}
      - DRIVE_OCR_MAX_FRAMES_PER_VIDEO=${DRIVE_OCR_MAX_FRAMES_PER_VIDEO:-300}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # SQS configuration
      - SQS_CONSUMER_ENABLED=${SQS_CONSUMER_ENABLED:-false}
      - SQS_ENDPOINT_URL=${SQS_ENDPOINT_URL:-}
      - SQS_REGION=${SQS_REGION:-ap-northeast-2}
      - SQS_OCR_QUEUE_URL=${SQS_OCR_QUEUE_URL:-}
    volumes:
      - ./services/drive-ocr-worker:/app
      - ../heimdex-media-contracts:/opt/heimdex-media-contracts:ro
      - ../heimdex-media-pipelines:/opt/heimdex-media-pipelines:ro
    depends_on:
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      sh -c "pip install --no-deps -e /opt/heimdex-media-contracts 2>/dev/null;
             pip install --no-deps -e /opt/heimdex-media-pipelines 2>/dev/null;
             python -m src.worker"

  # DEPRECATED (2026-02-26): llama-caption-server replaced by Qwen2-VL-2B on Aircloud+ GPU.
  # Caption worker no longer uses HTTP-based llama backend (CAPTION_ENGINE=qwen2vl on Aircloud+).
  # Kept for local dev fallback only. Removal planned in PR2/PR4.
  llama-caption-server:
    profiles: ["llama-caption"]
    build:
      context: ./services/llama-caption-server
      dockerfile: Dockerfile
    container_name: heimdex-llama-caption
    networks:
      - default
      - caption-net
    expose:
      - "8089"
    mem_limit: 4g
    cpus: "4.0"
    environment:
      - LLAMA_API_KEY=${LLAMA_CAPTION_API_KEY:-}
      - LLAMA_THREADS=${LLAMA_CAPTION_THREADS:-2}
      - LLAMA_MLOCK=${LLAMA_MLOCK:-false}
    volumes:
      - llama_models:/models
    ulimits:
      memlock:
        soft: -1
        hard: -1
    healthcheck:
      test: ["CMD", "bash", "/usr/local/bin/healthcheck.sh"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 120s
    restart: unless-stopped

  # DEPRECATED (2026-02-26): Caption enrichment worker migrated to Aircloud+ GPU.
  # This CPU service definition is kept for local dev only.
  # Staging/prod uses ghcr.io/jlee-heimdex/heimdex-caption-worker-gpu:latest on Aircloud+.
  # Model: Qwen/Qwen2-VL-2B-Instruct (GPU) vs OpenGVLab/InternVL2-1B (CPU, below).
  # Guarded by profiles: ["ec2-legacy"] â€” requires --profile ec2-legacy to start.
  drive-caption-worker:
    profiles: ["ec2-legacy"]
    build:
      context: .
      dockerfile: services/drive-caption-worker/Dockerfile
    container_name: heimdex-drive-caption-worker
    mem_limit: 4g
    cpus: "2.0"
    environment:
      - PYTHONPATH=/app
      - MINIO_ENDPOINT=${MINIO_ENDPOINT-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heimdex}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-heimdex_dev_password}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - SCENE_CAPTION_ENABLED=${SCENE_CAPTION_ENABLED:-false}
      - CAPTION_ENGINE=${CAPTION_ENGINE:-internvl2}
      - DRIVE_INTERNAL_API_KEY=${DRIVE_INTERNAL_API_KEY:-}
      - DRIVE_API_BASE_URL=http://api:8000
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-heimdex-drive}
      - S3_REGION=${S3_REGION:-ap-northeast-2}
      - DRIVE_CAPTION_CONCURRENCY=${DRIVE_CAPTION_CONCURRENCY:-1}
      - DRIVE_CAPTION_MODEL=${DRIVE_CAPTION_MODEL:-OpenGVLab/InternVL2-1B}
      - LLAMA_CAPTION_URL=http://llama-caption-server:8089
      - LLAMA_CAPTION_API_KEY=${LLAMA_CAPTION_API_KEY:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HF_HOME=/data/huggingface
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-2}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-2}
      # SQS configuration
      - SQS_CONSUMER_ENABLED=${SQS_CONSUMER_ENABLED:-false}
      - SQS_ENDPOINT_URL=${SQS_ENDPOINT_URL:-}
      - SQS_REGION=${SQS_REGION:-ap-northeast-2}
      - SQS_CAPTION_QUEUE_URL=${SQS_CAPTION_QUEUE_URL:-}
    volumes:
      - ./services/drive-caption-worker:/app
      - ../heimdex-media-contracts:/opt/heimdex-media-contracts:ro
      - ../heimdex-media-pipelines:/opt/heimdex-media-pipelines:ro
      - huggingface_cache:/data/huggingface
    networks:
      - default
      - caption-net
    depends_on:
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      sh -c "pip install --no-deps -e /opt/heimdex-media-contracts 2>/dev/null;
             pip install --no-deps -e /opt/heimdex-media-pipelines 2>/dev/null;
             python -m src.worker"

  # Visual embedding worker (SigLIP2 vision encoder).
  # Staging/prod uses ghcr.io/jlee-heimdex/heimdex-visual-embed-worker-gpu:latest on Aircloud+.
  # Model: google/siglip2-base-patch16-256 â€” 768-dim visual embeddings.
  # Guarded by profiles: ["ec2-legacy"] â€” requires --profile ec2-legacy to start.
  drive-visual-embed-worker:
    profiles: ["ec2-legacy"]
    build:
      context: .
      dockerfile: services/drive-visual-embed-worker/Dockerfile
    container_name: heimdex-drive-visual-embed-worker
    mem_limit: 4g
    cpus: "2.0"
    environment:
      - PYTHONPATH=/app
      - MINIO_ENDPOINT=${MINIO_ENDPOINT-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heimdex}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-heimdex_dev_password}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - VISUAL_EMBED_ENABLED=${VISUAL_EMBED_ENABLED:-false}
      - VISUAL_EMBED_CONCURRENCY=${VISUAL_EMBED_CONCURRENCY:-1}
      - DRIVE_INTERNAL_API_KEY=${DRIVE_INTERNAL_API_KEY:-}
      - DRIVE_API_BASE_URL=http://api:8000
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-heimdex-drive}
      - S3_REGION=${S3_REGION:-ap-northeast-2}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - HF_HOME=/data/huggingface
      - OMP_NUM_THREADS=${OMP_NUM_THREADS:-2}
      - MKL_NUM_THREADS=${MKL_NUM_THREADS:-2}
      # SQS configuration
      - SQS_CONSUMER_ENABLED=${SQS_CONSUMER_ENABLED:-false}
      - SQS_ENDPOINT_URL=${SQS_ENDPOINT_URL:-}
      - SQS_REGION=${SQS_REGION:-ap-northeast-2}
      - SQS_VISUAL_EMBED_QUEUE_URL=${SQS_VISUAL_EMBED_QUEUE_URL:-}
    volumes:
      - ./services/drive-visual-embed-worker:/app
      - huggingface_cache:/data/huggingface
    networks:
      - default
    depends_on:
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      sh -c "python -m src.worker"
  # DEPRECATED (2026-02-26): STT enrichment worker migrated to Aircloud+ GPU.
  # This CPU service definition is kept for local dev only.
  # Staging/prod uses ghcr.io/jlee-heimdex/heimdex-stt-worker-gpu:latest on Aircloud+.
  # Model: turbo/cuda/float16 (GPU) vs small/cpu/int8 (CPU, below).
  # Guarded by profiles: ["ec2-legacy"] â€” requires --profile ec2-legacy to start.
  drive-stt-worker:
    profiles: ["ec2-legacy"]
    build:
      context: .
      dockerfile: services/drive-stt-worker/Dockerfile
    container_name: heimdex-drive-stt-worker
    mem_limit: 2g
    cpus: "2.0"
    environment:
      - PYTHONPATH=/app
      - MINIO_ENDPOINT=${MINIO_ENDPOINT-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heimdex}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-heimdex_dev_password}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - DRIVE_STT_ENABLED=${DRIVE_STT_ENABLED:-false}
      - DRIVE_STT_MODEL=${DRIVE_STT_MODEL:-small}
      - DRIVE_STT_LANGUAGE=${DRIVE_STT_LANGUAGE:-ko}
      - DRIVE_STT_BACKEND=${DRIVE_STT_BACKEND:-faster-whisper}
      - DRIVE_INTERNAL_API_KEY=${DRIVE_INTERNAL_API_KEY:-}
      - DRIVE_API_BASE_URL=http://api:8000
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-heimdex-drive}
      - S3_REGION=${S3_REGION:-ap-northeast-2}
      - DRIVE_STT_CONCURRENCY=${DRIVE_STT_CONCURRENCY:-1}
      - DRIVE_STT_MAX_AUDIO_SECONDS=${DRIVE_STT_MAX_AUDIO_SECONDS:-3600}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # SQS configuration
      - SQS_CONSUMER_ENABLED=${SQS_CONSUMER_ENABLED:-false}
      - SQS_ENDPOINT_URL=${SQS_ENDPOINT_URL:-}
      - SQS_REGION=${SQS_REGION:-ap-northeast-2}
      - SQS_STT_QUEUE_URL=${SQS_STT_QUEUE_URL:-}
      - DRIVE_STT_DIARIZATION_ENABLED=${DRIVE_STT_DIARIZATION_ENABLED:-false}
      - DRIVE_STT_DIARIZATION_MODEL=${DRIVE_STT_DIARIZATION_MODEL:-pyannote/speaker-diarization-3.1}
      - DRIVE_STT_MIN_SPEAKERS=${DRIVE_STT_MIN_SPEAKERS:-1}
      - DRIVE_STT_MAX_SPEAKERS=${DRIVE_STT_MAX_SPEAKERS:-4}
      - HF_ACCESS_TOKEN=${HF_ACCESS_TOKEN:-}
    volumes:
      - ./services/drive-stt-worker:/app
      - ../heimdex-media-contracts:/opt/heimdex-media-contracts:ro
      - ../heimdex-media-pipelines:/opt/heimdex-media-pipelines:ro
      - whisper_model_cache:/data/whisper-models
    depends_on:
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      sh -c "pip install --no-deps -e /opt/heimdex-media-contracts 2>/dev/null;
             pip install --no-deps -e /opt/heimdex-media-pipelines 2>/dev/null;
             python -m src.worker"

  # Face detection GPU worker (Aircloud+).
  # Consumes from SQS face queue, detects faces, matches identities via pgvector.
  # Staging/prod uses ghcr.io/jlee-heimdex/heimdex-face-worker-gpu:latest on Aircloud+.
  # Guarded by profiles: ["ec2-legacy"] â€” requires --profile ec2-legacy to start.
  drive-face-worker:
    profiles: ["ec2-legacy"]
    build:
      context: .
      dockerfile: services/drive-face-worker/Dockerfile
    container_name: heimdex-drive-face-worker
    mem_limit: 4g
    cpus: "2.0"
    environment:
      - PYTHONPATH=/app
