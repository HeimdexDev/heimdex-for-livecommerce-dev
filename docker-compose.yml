      # dispatcher still routes blur.export_created messages but the
      # API will never publish them, so the worker effectively only
      # runs blur-job tasks.
      - BLUR_EXPORT_ENABLED=${BLUR_EXPORT_ENABLED:-false}
      - DRIVE_BLUR_CONCURRENCY=${DRIVE_BLUR_CONCURRENCY:-1}
      - BLUR_OWL_MODEL=${BLUR_OWL_MODEL:-google/owlv2-base-patch16-ensemble}
      - BLUR_OWL_STRIDE=${BLUR_OWL_STRIDE:-5}
      - BLUR_OWL_SCORE_THRESHOLD=${BLUR_OWL_SCORE_THRESHOLD:-0.35}
      - BLUR_LEASE_SECONDS=${BLUR_LEASE_SECONDS:-1800}
      - BLUR_ALLOW_CPU=${BLUR_ALLOW_CPU:-false}
      - USE_GPU=${USE_GPU:-false}
      # HuggingFace cache persists between runs when mounted
      - HF_HOME=/models/hf
    volumes:
      - ./services/drive-blur-worker:/app
      - ../heimdex-media-contracts:/opt/heimdex-media-contracts:ro
      - ../heimdex-media-pipelines:/opt/heimdex-media-pipelines:ro
      - ../heimdex-worker-sdk:/opt/heimdex-worker-sdk:ro
      - huggingface_cache:/models/hf
    depends_on:
      minio:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      sh -c "pip install --no-deps -e /opt/heimdex-media-contracts 2>/dev/null;
             pip install --no-deps -e /opt/heimdex-media-pipelines 2>/dev/null;
             pip install --no-deps -e /opt/heimdex-worker-sdk 2>/dev/null;
             python -m src.worker"


  product-enumerate-worker:
    # Phase 2: shorts-auto product mode v2 enumerate worker.
    # Off by default — enable with
    #   docker compose --profile product-enum up product-enumerate-worker
    # Runs on Aircloud GPU in staging/prod (Phase 2 deliverable).
    # Locally requires NVIDIA GPU or ENUMERATE_ALLOW_CPU=true.
    profiles: ["product-enum"]
    build:
      context: ..
      dockerfile: dev-heimdex-for-livecommerce/services/product-enumerate-worker/Dockerfile.gpu
    container_name: heimdex-product-enumerate-worker
    mem_limit: 8g
    cpus: "4.0"
    environment:
      - PYTHONPATH=/app
      - DRIVE_INTERNAL_API_KEY=${DRIVE_INTERNAL_API_KEY:-}
      - DRIVE_API_BASE_URL=http://api:8000
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-heimdex-drive}
      - S3_REGION=${S3_REGION:-ap-northeast-2}
      # MinIO / S3 — the SDK's S3Client reads these from env. Without
      # MINIO_ENDPOINT the SDK falls back to ``localhost:9000`` (i.e.
      # the container's own loopback) so all keyframe reads 404.
      # Inter-container default is ``minio:9000`` matching the other
      # worker profiles.
      - MINIO_ENDPOINT=${MINIO_ENDPOINT-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heimdex}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-heimdex_dev_password}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # SQS
      - SQS_CONSUMER_ENABLED=${SQS_CONSUMER_ENABLED:-false}
      - SQS_ENDPOINT_URL=${SQS_ENDPOINT_URL:-}
      - SQS_REGION=${SQS_REGION:-ap-northeast-2}
      - SQS_PRODUCT_ENUMERATE_QUEUE_URL=${SQS_PRODUCT_ENUMERATE_QUEUE_URL:-}
      # Worker identity
      - WORKER_ID=${WORKER_ID:-product-enumerate-worker-local}
      - WORKER_LEASE_SECONDS=${WORKER_LEASE_SECONDS:-600}
      - DRIVE_PRODUCT_ENUMERATE_CONCURRENCY=${DRIVE_PRODUCT_ENUMERATE_CONCURRENCY:-1}
      # Feature flag mirror (worker hard-refuses to start when false).
      - PRODUCT_V2_ENABLED=${AUTO_SHORTS_PRODUCT_V2_ENABLED:-false}
      # OpenAI gpt-4o-mini for vision enumeration.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${AUTO_SHORTS_PRODUCT_V2_OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_TIMEOUT_SEC=${AUTO_SHORTS_PRODUCT_V2_OPENAI_TIMEOUT_SEC:-30}
      - OPENAI_MAX_RETRIES=${AUTO_SHORTS_PRODUCT_V2_OPENAI_MAX_RETRIES:-3}
      - OPENAI_BATCH_SIZE=${AUTO_SHORTS_PRODUCT_V2_OPENAI_BATCH_SIZE:-10}
      # Pipeline versions — must match the API's
      # AUTO_SHORTS_PRODUCT_V2_*_VERSION envs.
      - ENUMERATION_VERSION=${AUTO_SHORTS_PRODUCT_V2_ENUMERATION_VERSION:-v1.0}
      - ENUMERATION_PROMPT_VERSION=${AUTO_SHORTS_PRODUCT_V2_ENUMERATION_PROMPT_VERSION:-v1.0}
      - MAX_KEYFRAMES_PER_VIDEO=${AUTO_SHORTS_PRODUCT_V2_MAX_KEYFRAMES_PER_VIDEO:-60}
      # Thresholds — calibrate on staging goldens before prod rollout.
      - ENUM_PROMINENCE_FLOOR_PCT=${AUTO_SHORTS_PRODUCT_V2_ENUM_PROMINENCE_FLOOR_PCT:-0.03}
      - ENUM_CLUSTER_COSINE_THRESHOLD=${AUTO_SHORTS_PRODUCT_V2_ENUM_CLUSTER_COSINE_THRESHOLD:-0.85}
      - ENUM_MIN_SUPPORTING_KEYFRAMES=${AUTO_SHORTS_PRODUCT_V2_ENUM_MIN_SUPPORTING_KEYFRAMES:-2}
      - ENUM_MIN_CONFIDENCE=${AUTO_SHORTS_PRODUCT_V2_ENUM_MIN_CONFIDENCE:-0.6}
      # Vision model — must match drive-visual-embed-worker exactly.
      - SIGLIP2_MODEL_ID=${AUTO_SHORTS_PRODUCT_V2_SIGLIP2_MODEL_ID:-google/siglip2-base-patch16-256}
      - ENUMERATE_ALLOW_CPU=${ENUMERATE_ALLOW_CPU:-false}
      - HF_HOME=/models/hf
    volumes:
      - ./services/product-enumerate-worker:/app
      - ../heimdex-media-contracts:/opt/heimdex-media-contracts:ro
      - ../heimdex-media-pipelines:/opt/heimdex-media-pipelines:ro
      - ../heimdex-worker-sdk:/opt/heimdex-worker-sdk:ro
      - huggingface_cache:/models/hf
    depends_on:
      api:
        condition: service_healthy
    command: >
      sh -c "pip install --no-deps -e /opt/heimdex-media-contracts 2>/dev/null;
             pip install --no-deps -e /opt/heimdex-media-pipelines 2>/dev/null;
             pip install --no-deps -e /opt/heimdex-worker-sdk 2>/dev/null;
             python -m src.worker"

  product-track-worker:
    # Phase 3c: shorts-auto product mode v2 track + assembly worker.
    # Off by default — enable with
    #   docker compose --profile product-track up product-track-worker
    # Runs on Aircloud GPU in staging/prod (Phase 3c-A scaffold;
    # Phase 3c-B adds the real SAM2 integration).
    # Locally requires NVIDIA GPU or TRACK_ALLOW_CPU=true.
    profiles: ["product-track"]
    build:
      context: ..
      dockerfile: dev-heimdex-for-livecommerce/services/product-track-worker/Dockerfile.gpu
    container_name: heimdex-product-track-worker
    mem_limit: 8g
    cpus: "4.0"
    environment:
      - PYTHONPATH=/app
      - DRIVE_INTERNAL_API_KEY=${DRIVE_INTERNAL_API_KEY:-}
      # F1 Phase 3 — opt into per-service identity (when set, the
      # worker sends X-Heimdex-Service-Id and the api validates the
      # bearer against INTERNAL_SERVICE_TOKENS[<this>]). Empty falls
      # back to the legacy global bearer.
      - INTERNAL_SERVICE_ID=${PRODUCT_TRACK_SERVICE_ID:-}
      - DRIVE_API_BASE_URL=http://api:8000
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-heimdex-drive}
      - S3_REGION=${S3_REGION:-ap-northeast-2}
      # MinIO / S3 — the SDK's S3Client reads these from env. Without
      # MINIO_ENDPOINT the SDK falls back to ``localhost:9000`` (i.e.
      # the container's own loopback) so all keyframe / proxy reads
      # 404. Inter-container default is ``minio:9000`` matching the
      # other worker profiles.
      - MINIO_ENDPOINT=${MINIO_ENDPOINT-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heimdex}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-heimdex_dev_password}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # SQS
      - SQS_CONSUMER_ENABLED=${SQS_CONSUMER_ENABLED:-false}
      - SQS_ENDPOINT_URL=${SQS_ENDPOINT_URL:-}
      - SQS_REGION=${SQS_REGION:-ap-northeast-2}
      - SQS_PRODUCT_TRACK_QUEUE_URL=${SQS_PRODUCT_TRACK_QUEUE_URL:-}
      # Worker identity
      - WORKER_ID=${WORKER_ID:-product-track-worker-local}
      # Track jobs are heavier than enumerate (SAM2 + per-scene video
      # decode). 1800s lease matches the queue's visibility timeout.
      - WORKER_LEASE_SECONDS=${PRODUCT_TRACK_WORKER_LEASE_SECONDS:-1800}
      - DRIVE_PRODUCT_TRACK_CONCURRENCY=${DRIVE_PRODUCT_TRACK_CONCURRENCY:-1}
      # Feature flag mirror (worker hard-refuses to start when false).
      - PRODUCT_V2_ENABLED=${AUTO_SHORTS_PRODUCT_V2_ENABLED:-false}
      # Vision model — must match drive-visual-embed-worker /
      # product-enumerate-worker exactly. Drift breaks the OS coarse
      # pre-filter at /scenes-by-visual-similarity.
      - SIGLIP2_MODEL_ID=${AUTO_SHORTS_PRODUCT_V2_SIGLIP2_MODEL_ID:-google/siglip2-base-patch16-256}
      # SAM2 checkpoint — calibrated in Phase 3c-B on staging goldens.
      - SAM2_MODEL_ID=${AUTO_SHORTS_PRODUCT_V2_SAM2_MODEL_ID:-facebook/sam2-hiera-base-plus}
      # OpenAI gpt-4o-mini for the LLM subset picker. Falls back to
      # GreedyPicker (deterministic) when OPENAI_API_KEY is empty.
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${AUTO_SHORTS_PRODUCT_V2_OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_TIMEOUT_SEC=${AUTO_SHORTS_PRODUCT_V2_OPENAI_TIMEOUT_SEC:-30}
      # Tracking thresholds — every config knob in TrackingConfig is
      # exposed as an env override so on-call can tune any single
      # one without a code change.
      - COARSE_PREFILTER_THRESHOLD=${AUTO_SHORTS_PRODUCT_V2_COARSE_PREFILTER_THRESHOLD:-0.45}
      - PRECISE_PASS_THRESHOLD=${AUTO_SHORTS_PRODUCT_V2_PRECISE_PASS_THRESHOLD:-0.72}
      - COARSE_TOP_K=${AUTO_SHORTS_PRODUCT_V2_COARSE_TOP_K:-60}
      - SAM2_SAMPLE_FPS=${AUTO_SHORTS_PRODUCT_V2_SAM2_SAMPLE_FPS:-5}
      - MIN_WINDOW_DURATION_MS=${AUTO_SHORTS_PRODUCT_V2_MIN_WINDOW_DURATION_MS:-1500}
      - MIN_AVG_BBOX_AREA_PCT=${AUTO_SHORTS_PRODUCT_V2_MIN_AVG_BBOX_AREA_PCT:-0.02}
      - MIN_AVG_CONFIDENCE=${AUTO_SHORTS_PRODUCT_V2_MIN_AVG_CONFIDENCE:-0.7}
      - MAX_WINDOWS_PER_PRODUCT=${AUTO_SHORTS_PRODUCT_V2_MAX_WINDOWS_PER_PRODUCT:-30}
      - TRACK_ALLOW_CPU=${TRACK_ALLOW_CPU:-false}
      - HF_HOME=/models/hf
    volumes:
      - ./services/product-track-worker:/app
      - ../heimdex-media-contracts:/opt/heimdex-media-contracts:ro
      - ../heimdex-media-pipelines:/opt/heimdex-media-pipelines:ro
      - ../heimdex-worker-sdk:/opt/heimdex-worker-sdk:ro
      - huggingface_cache:/models/hf
    depends_on:
      api:
        condition: service_healthy
    command: >
      sh -c "pip install --no-deps -e /opt/heimdex-media-contracts 2>/dev/null;
             pip install --no-deps -e /opt/heimdex-media-pipelines 2>/dev/null;
             pip install --no-deps -e /opt/heimdex-worker-sdk 2>/dev/null;
             python -m src.worker"


  bgutil-provider:
    profiles: ["youtube"]
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: heimdex-bgutil-provider
    mem_limit: 512m
    restart: unless-stopped
    environment:
      - TOKEN_TTL=${BGUTIL_TOKEN_TTL:-21600}
    ports:
      - "127.0.0.1:4416:4416"

  youtube-worker:
    profiles: ["youtube"]
    build:
      context: .
      dockerfile: services/youtube-worker/Dockerfile
    container_name: heimdex-youtube-worker
    mem_limit: 2g
    cpus: "2.0"
    environment:
      - PYTHONPATH=/app
      - YOUTUBE_ENABLED=${YOUTUBE_ENABLED:-false}
      - YOUTUBE_ORG_ID=${YOUTUBE_ORG_ID:-}
      - YOUTUBE_COOKIES_PATH=${YOUTUBE_COOKIES_PATH:-}
      - YOUTUBE_POT_PROVIDER_URL=${YOUTUBE_POT_PROVIDER_URL:-http://bgutil-provider:4416}
      - YOUTUBE_S3_BUCKET=${YOUTUBE_S3_BUCKET:-}
      - YOUTUBE_SYNC_INTERVAL_SECONDS=${YOUTUBE_SYNC_INTERVAL_SECONDS:-21600}
      - YOUTUBE_DOWNLOAD_FORMAT=${YOUTUBE_DOWNLOAD_FORMAT:-bestvideo[height<=720][ext=mp4]+bestaudio[ext=m4a]/best[height<=720]}
      - YOUTUBE_RATE_LIMIT_SLEEP=${YOUTUBE_RATE_LIMIT_SLEEP:-3}
      - YOUTUBE_RATE_LIMIT_MAX_SLEEP=${YOUTUBE_RATE_LIMIT_MAX_SLEEP:-8}
      - YOUTUBE_MAX_CONCURRENT_DOWNLOADS=${YOUTUBE_MAX_CONCURRENT_DOWNLOADS:-2}
      - YOUTUBE_AUTO_DELETE_ORIGINALS=${YOUTUBE_AUTO_DELETE_ORIGINALS:-true}
      - YOUTUBE_ORIGINAL_TTL_DAYS=${YOUTUBE_ORIGINAL_TTL_DAYS:-7}
      - DRIVE_API_BASE_URL=${DRIVE_API_BASE_URL:-http://api:8000}
      - DRIVE_INTERNAL_API_KEY=${DRIVE_INTERNAL_API_KEY:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-heimdex-drive}
      - S3_REGION=${S3_REGION:-ap-northeast-2}
      - SQS_ENABLED=${SQS_ENABLED:-false}
      - SQS_REGION=${SQS_REGION:-ap-northeast-2}
      - SQS_TRANSCODE_QUEUE_URL=${SQS_TRANSCODE_QUEUE_URL:-}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./services/youtube-worker:/app
      - youtube_tmp:/data/youtube-tmp
      - ${YOUTUBE_COOKIES_HOST_DIR:-./secrets/youtube}:/app/cookies:ro
    depends_on:
      api:
        condition: service_healthy
      bgutil-provider:
        condition: service_started
    command: >
      sh -c "python -m src.worker"

  shorts-render-worker:
    build:
      context: .
      dockerfile: services/shorts-render-worker/Dockerfile
    container_name: heimdex-shorts-render-worker
    environment:
      - PYTHONPATH=/app
      - SQS_CONSUMER_ENABLED=${SQS_CONSUMER_ENABLED:-true}
      - SQS_SHORTS_RENDER_QUEUE_URL=${SQS_SHORTS_RENDER_QUEUE_URL:-}
      - SQS_ENDPOINT_URL=${SQS_ENDPOINT_URL:-}
      - SQS_REGION=${SQS_REGION:-ap-northeast-2}
      - DRIVE_API_BASE_URL=http://api:8000
      - DRIVE_INTERNAL_API_KEY=${DRIVE_INTERNAL_API_KEY:-}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heimdex}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-heimdex_dev_password}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-heimdex-drive}
      - FONT_DIR=/usr/share/fonts/heimdex
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      # Mount pipeline repos (same pattern as drive-worker)
      - ../heimdex-media-contracts:/opt/heimdex-media-contracts:ro
      - ../heimdex-media-pipelines:/opt/heimdex-media-pipelines:ro
    depends_on:
      api:
        condition: service_healthy
      minio:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
    restart: unless-stopped
    command: >
      sh -c "pip install --no-deps /opt/heimdex-media-contracts 2>/dev/null;
             pip install --no-deps /opt/heimdex-media-pipelines 2>/dev/null;
             python -m src.worker"

  # NOTE (2026-02-26): elasticmq is for LOCAL DEV SQS simulation only.
  # Staging/prod uses real AWS SQS (ap-northeast-2). Not needed on EC2.
  # Guarded by profiles: ["local-dev"] — requires --profile local-dev to start.
  elasticmq:
    profiles: ["local-dev"]
    image: softwaremill/elasticmq-native:latest
    container_name: heimdex-elasticmq
    mem_limit: 256m
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf

  # Closed-vocabulary VMD search sidecar. Hosts ~162 product/brand terms +
  # precomputed SigLIP2 prompt embeddings for direct kNN lookups, bypassing
  # the normal semantic pipeline. Opt-in via the ``closed-vocab`` profile so
  # daily ``docker compose up -d`` doesn't pay the 512MB / 1 CPU cost when
  # the feature is off. To bring it up: ``docker compose --profile closed-vocab up -d``
  # (or ``COMPOSE_PROFILES=closed-vocab docker compose up -d``).
  # Image source + protocol: see .claude/docs/closed-vocab-search.md.
  closed-vocab-search:
    image: ghcr.io/5sudeng/heimdex-closed-vocab-search:v0.1.0
    profiles: ["closed-vocab"]
    restart: unless-stopped
    mem_limit: 512m
    cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  opensearch_data:
  minio_data:
  huggingface_cache:
  whisper_model_cache:
  llama_models:
  youtube_tmp:

networks:
  caption-net:
    internal: true
