services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: heimdex-postgres
    mem_limit: 1g
    cpus: "2.0"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-heimdex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-heimdex_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-heimdex}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U heimdex"]
      interval: 5s
      timeout: 5s
      retries: 5

  opensearch:
    build:
      context: ./infra/opensearch
      dockerfile: Dockerfile
    image: heimdex-opensearch:2.11.1-nori
    container_name: heimdex-opensearch
    mem_limit: 1g
    cpus: "2.0"
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 10s
      timeout: 10s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: heimdex-minio
    mem_limit: 512m
    cpus: "1.0"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-heimdex}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-heimdex_dev_password}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: heimdex-api
    mem_limit: 6g  # Increased from 4g for SigLIP2 text encoder (~200MB BF16) alongside E5-large
    cpus: "4.0"
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://heimdex:heimdex_dev_password@postgres:5432/heimdex}
      - DATABASE_URL_SYNC=${DATABASE_URL_SYNC:-postgresql://heimdex:heimdex_dev_password@postgres:5432/heimdex}
      - OPENSEARCH_URL=${OPENSEARCH_URL:-http://opensearch:9200}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT-minio:9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-heimdex}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-heimdex_dev_password}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRATION_HOURS=${JWT_EXPIRATION_HOURS:-24}
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-DEBUG}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-*.app.heimdex.local,localhost}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE:-true}
      - AUTH_COOKIE_SAMESITE=${AUTH_COOKIE_SAMESITE:-lax}
      # Embedding configuration - set EMBEDDING_USE_MOCK=false for real semantic search
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-intfloat/multilingual-e5-large}
      - EMBEDDING_DIMENSION=${EMBEDDING_DIMENSION:-1024}
      - EMBEDDING_DEVICE=${EMBEDDING_DEVICE:-cpu}
      - EMBEDDING_USE_MOCK=${EMBEDDING_USE_MOCK:-true}
      # Cross-encoder reranker (GPU service)
      - RERANKER_ENABLED=${RERANKER_ENABLED:-false}
      - RERANKER_SERVICE_URL=${RERANKER_SERVICE_URL:-}
      - RERANKER_TIMEOUT_MS=${RERANKER_TIMEOUT_MS:-5000}
      - RERANKER_USE_MOCK=${RERANKER_USE_MOCK:-false}
      # Search rate limiting — per-(org, user) sliding window. Livenow
      # customer support incident 2026-04-24 drove the per-user switch;
      # the previous per-org bucket starved concurrent teammates.
      - SEARCH_RATE_LIMIT_MAX_REQUESTS=${SEARCH_RATE_LIMIT_MAX_REQUESTS:-60}
      - SEARCH_RATE_LIMIT_WINDOW_SECONDS=${SEARCH_RATE_LIMIT_WINDOW_SECONDS:-60}
      # Speech-aware scene splitting + VLM tags
      - DRIVE_SPEECH_SPLIT_ENABLED=${DRIVE_SPEECH_SPLIT_ENABLED:-false}
      - VLM_TAGS_ENABLED=${VLM_TAGS_ENABLED:-false}
      - AI_TAGS_ENABLED=${AI_TAGS_ENABLED:-false}
      - FACE_THUMBNAIL_S3_PRIMARY=${FACE_THUMBNAIL_S3_PRIMARY:-false}
      - HIGHLIGHT_REEL_ENABLED=${HIGHLIGHT_REEL_ENABLED:-false}
      - VIDEO_SUMMARY_ENABLED=${VIDEO_SUMMARY_ENABLED:-false}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      # Image caption (OpenAI gpt-4o) — see services/api/app/modules/image_caption/
      - IMAGE_CAPTION_ENABLED=${IMAGE_CAPTION_ENABLED:-false}
      - IMAGE_CAPTION_MODEL=${IMAGE_CAPTION_MODEL:-gpt-4o}
      - IMAGE_CAPTION_IMAGE_DETAIL=${IMAGE_CAPTION_IMAGE_DETAIL:-low}
      - IMAGE_CAPTION_MAX_CONCURRENCY=${IMAGE_CAPTION_MAX_CONCURRENCY:-4}
      - IMAGE_CAPTION_TIMEOUT_S=${IMAGE_CAPTION_TIMEOUT_S:-30.0}
      - IMAGE_CAPTION_DAILY_BUDGET_USD=${IMAGE_CAPTION_DAILY_BUDGET_USD:-50.0}
      - IMAGE_CAPTION_ESTIMATED_COST_PER_CALL_USD=${IMAGE_CAPTION_ESTIMATED_COST_PER_CALL_USD:-0.012}
      - IMAGE_CAPTION_PROMPT_VERSION=${IMAGE_CAPTION_PROMPT_VERSION:-2026-04-13-v1}
      # Auto-shorts product mode v2 (wizard) — pass-through to api so .env
      # toggles propagate. Without this block the api silently uses
      # config.py defaults (every flag false) regardless of host .env state.
      # The same pattern of bug bit Phase 2 — the worker block had its own
      # vars wired but the api block didn't, so the API never saw flag flips.
      - AUTO_SHORTS_PRODUCT_V2_ENABLED=${AUTO_SHORTS_PRODUCT_V2_ENABLED:-false}
      - AUTO_SHORTS_PRODUCT_V2_ROLLOUT_PCT=${AUTO_SHORTS_PRODUCT_V2_ROLLOUT_PCT:-0}
      # Per-org concurrency cap on in-flight ProductScanJob rows
      # (counts modes scan_order + enumerate + render_child in ACTIVE
      # stages). Default 10. Operators raised this from 3 to 10 on
      # 2026-05-06 after the cap was paper-cutting iteration cycles.
      - AUTO_SHORTS_PRODUCT_V2_MAX_CONCURRENT_PER_ORG=${AUTO_SHORTS_PRODUCT_V2_MAX_CONCURRENT_PER_ORG:-10}
      - AUTO_SHORTS_PRODUCT_V2_PUBLISH_SCAN_ORDER_ENABLED=${AUTO_SHORTS_PRODUCT_V2_PUBLISH_SCAN_ORDER_ENABLED:-false}
      # PR 2.5 STT-pivot: track_mode flag. ``"sam2"`` (default) preserves
      # SAM2 visual tracking. ``"stt"`` swaps in the in-process STT
      # pipeline at shorts_auto_product/track_stt — see
      # .claude/plans/shorts-auto-product-stt-pivot.md.
      - AUTO_SHORTS_PRODUCT_V2_TRACK_MODE=${AUTO_SHORTS_PRODUCT_V2_TRACK_MODE:-sam2}
      # PR 3 v0.16.0 STT-first enumeration. Runs alongside vision in the
      # api process; OFF by default until calibration goldens land
      # (PR 5 of .claude/plans/shorts-auto-product-stt-enum-2026-05-06.md).
      - AUTO_SHORTS_PRODUCT_V2_STT_ENUM_ENABLED=${AUTO_SHORTS_PRODUCT_V2_STT_ENUM_ENABLED:-false}
      - AUTO_SHORTS_PRODUCT_V2_STT_ENUM_MODEL=${AUTO_SHORTS_PRODUCT_V2_STT_ENUM_MODEL:-gpt-4o-mini}
      - AUTO_SHORTS_PRODUCT_V2_STT_ENUM_MAX_CONCURRENCY=${AUTO_SHORTS_PRODUCT_V2_STT_ENUM_MAX_CONCURRENCY:-4}
      - AUTO_SHORTS_PRODUCT_V2_STT_ENUM_PROMPT_VERSION=${AUTO_SHORTS_PRODUCT_V2_STT_ENUM_PROMPT_VERSION:-v1.0}
      - AUTO_SHORTS_PRODUCT_V2_STT_ENUM_MAX_TRANSCRIPT_TOKENS=${AUTO_SHORTS_PRODUCT_V2_STT_ENUM_MAX_TRANSCRIPT_TOKENS:-80000}
      - AUTO_SHORTS_PRODUCT_V2_STT_ENUM_TIMEOUT_S=${AUTO_SHORTS_PRODUCT_V2_STT_ENUM_TIMEOUT_S:-90}
      # Auto-shorts post-render Whisper subtitle refinement
      # (.claude/plans/auto-shorts-whisper-subtitles-2026-05-06.md).
      # Master flag default false; set to true on staging to enable
      # the refinement hook. Memory: feedback_compose_env_passthrough_required.md
      # — these lines are mandatory; ``restart`` does not reload .env.
      - AUTO_SHORTS_PRODUCT_V2_WHISPER_REFINE_ENABLED=${AUTO_SHORTS_PRODUCT_V2_WHISPER_REFINE_ENABLED:-false}
      - AUTO_SHORTS_PRODUCT_V2_WHISPER_ROLLOUT_PCT=${AUTO_SHORTS_PRODUCT_V2_WHISPER_ROLLOUT_PCT:-0}
      - AUTO_SHORTS_PRODUCT_V2_WHISPER_MODEL=${AUTO_SHORTS_PRODUCT_V2_WHISPER_MODEL:-whisper-1}
      - AUTO_SHORTS_PRODUCT_V2_WHISPER_LANGUAGE=${AUTO_SHORTS_PRODUCT_V2_WHISPER_LANGUAGE:-ko}
      - AUTO_SHORTS_PRODUCT_V2_WHISPER_DAILY_BUDGET_USD=${AUTO_SHORTS_PRODUCT_V2_WHISPER_DAILY_BUDGET_USD:-5.0}
      - AUTO_SHORTS_PRODUCT_V2_WHISPER_TIMEOUT_S=${AUTO_SHORTS_PRODUCT_V2_WHISPER_TIMEOUT_S:-60}
      - AUTO_SHORTS_PRODUCT_V2_WHISPER_S3_DOWNLOAD_TIMEOUT_S=${AUTO_SHORTS_PRODUCT_V2_WHISPER_S3_DOWNLOAD_TIMEOUT_S:-30}
      # Auto-shorts overlay-mode caption flow
      # (.claude/plans/auto-shorts-overlay-mode-2026-05-07.md). When
      # ON: Whisper post-render writes cues to the parent's
      # input_spec (no child render); /rerender produces an export
      # child that does NOT replace the parent. Default off; flip on
      # staging only.
      - AUTO_SHORTS_PRODUCT_V2_OVERLAY_MODE_ENABLED=${AUTO_SHORTS_PRODUCT_V2_OVERLAY_MODE_ENABLED:-false}
      # Auto-shorts storyboard composition (Tier B / Tier C). Plan
      # in ``track_stt/storyboard/__init__.py``. Default-off; flip
      # on staging via .env. Same allowlist rule as the whisper
      # block above — ``restart`` doesn't reload the .env file
      # without the matching env: line here.
      - AUTO_SHORTS_PRODUCT_V2_STORYBOARD_MODE_ENABLED=${AUTO_SHORTS_PRODUCT_V2_STORYBOARD_MODE_ENABLED:-false}
      - AUTO_SHORTS_PRODUCT_V2_STORYBOARD_PICKER=${AUTO_SHORTS_PRODUCT_V2_STORYBOARD_PICKER:-heuristic}
      - AUTO_SHORTS_PRODUCT_V2_STORYBOARD_HOOK_MS=${AUTO_SHORTS_PRODUCT_V2_STORYBOARD_HOOK_MS:-8000}
      - AUTO_SHORTS_PRODUCT_V2_STORYBOARD_INTRO_MS=${AUTO_SHORTS_PRODUCT_V2_STORYBOARD_INTRO_MS:-12000}
      - AUTO_SHORTS_PRODUCT_V2_STORYBOARD_DETAIL_MS=${AUTO_SHORTS_PRODUCT_V2_STORYBOARD_DETAIL_MS:-25000}
      - AUTO_SHORTS_PRODUCT_V2_STORYBOARD_CTA_MS=${AUTO_SHORTS_PRODUCT_V2_STORYBOARD_CTA_MS:-8000}
      - AUTO_SHORTS_PRODUCT_V2_STORYBOARD_SHADOW_MODE=${AUTO_SHORTS_PRODUCT_V2_STORYBOARD_SHADOW_MODE:-false}
      # Auto-shorts: OCR re-rank in mention_extractor. Plan
      # `.claude/plans/ocr-mention-extractor-rerank.md`. Default OFF; flip
      # per-org once OCR backfill has populated v5 for that org's videos.
      # Without these passthrough lines, setting the env vars in `.env`
      # is a no-op inside the container (allowlist-based per
      # `feedback_compose_env_passthrough_required.md`).
      - AUTO_SHORTS_PRODUCT_V2_OCR_RERANK_ENABLED=${AUTO_SHORTS_PRODUCT_V2_OCR_RERANK_ENABLED:-false}
      - AUTO_SHORTS_PRODUCT_V2_OCR_BOOST=${AUTO_SHORTS_PRODUCT_V2_OCR_BOOST:-0.6}
      # Auto-shorts storyboard Tier C (LLM director). Plan
      # `.claude/plans/storyboard-tier-c-llm-picker-2026-05-07.md`.
      # Activated by AUTO_SHORTS_PRODUCT_V2_STORYBOARD_PICKER=llm
      # (the master ..._STORYBOARD_MODE_ENABLED flag must also be true).
      # Reuses the existing OPENAI_API_KEY from the chunk_scorer block.
      - AUTO_SHORTS_PRODUCT_V2_STORYBOARD_LLM_MODEL=${AUTO_SHORTS_PRODUCT_V2_STORYBOARD_LLM_MODEL:-gpt-4o-mini}
      - AUTO_SHORTS_PRODUCT_V2_STORYBOARD_LLM_TIMEOUT_S=${AUTO_SHORTS_PRODUCT_V2_STORYBOARD_LLM_TIMEOUT_S:-5.0}
      - AUTO_SHORTS_PRODUCT_V2_STORYBOARD_LLM_DAILY_BUDGET_USD=${AUTO_SHORTS_PRODUCT_V2_STORYBOARD_LLM_DAILY_BUDGET_USD:-5.0}
      - AUTO_SHORTS_PRODUCT_V2_STORYBOARD_LLM_PROMPT_VERSION=${AUTO_SHORTS_PRODUCT_V2_STORYBOARD_LLM_PROMPT_VERSION:-v1}
      # Auth0 configuration
      - AUTH0_ENABLED=${AUTH0_ENABLED:-false}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN:-}
      - AUTH0_AUDIENCE=${AUTH0_AUDIENCE:-}
      - AUTH0_ORG_CLAIM=${AUTH0_ORG_CLAIM:-https://heimdex.io/org_id}
      - AUTH0_ALGORITHMS=${AUTH0_ALGORITHMS:-RS256}
      # Agent configuration
      - AGENT_INGEST_ENABLED=${AGENT_INGEST_ENABLED:-true}
      - AGENT_API_KEY=${AGENT_API_KEY:-dev-agent-key-change-in-production}
      - AGENT_API_KEY_MODE=${AGENT_API_KEY_MODE:-global}
      - AGENT_INGEST_MAX_SCENES=${AGENT_INGEST_MAX_SCENES:-500}
      - AGENT_INGEST_MAX_TRANSCRIPT_CHARS=${AGENT_INGEST_MAX_TRANSCRIPT_CHARS:-50000}
      - DEVICE_SECRET_PEPPER=${DEVICE_SECRET_PEPPER:-dev-device-pepper-change-in-production}
      - PAIRING_CODE_TTL_MINUTES=${PAIRING_CODE_TTL_MINUTES:-10}
      - AGENT_INTENTS_ENABLED=${AGENT_INTENTS_ENABLED:-true}
      - AGENT_INTENT_TTL_MINUTES=${AGENT_INTENT_TTL_MINUTES:-10}
      - AGENT_INTENT_MAX_PER_ORG=${AGENT_INTENT_MAX_PER_ORG:-10}
      - AGENT_INTENT_EXCHANGE_MAX_ATTEMPTS=${AGENT_INTENT_EXCHANGE_MAX_ATTEMPTS:-5}
      # Ingest safety
      - INGEST_REQUIRE_TIMESTAMP=${INGEST_REQUIRE_TIMESTAMP:-false}
      - INGEST_TIMESTAMP_SKEW_SECONDS=${INGEST_TIMESTAMP_SKEW_SECONDS:-300}
      - INGEST_REQUIRE_IDEMPOTENCY=${INGEST_REQUIRE_IDEMPOTENCY:-false}
      - INGEST_IDEMPOTENCY_TTL_SECONDS=${INGEST_IDEMPOTENCY_TTL_SECONDS:-600}
      # SQS queue configuration
      - SQS_ENABLED=${SQS_ENABLED:-false}
      - SQS_ENDPOINT_URL=${SQS_ENDPOINT_URL:-}
      - SQS_REGION=${SQS_REGION:-ap-northeast-2}
      - SQS_PROCESSING_QUEUE_URL=${SQS_PROCESSING_QUEUE_URL:-}
      - SQS_CAPTION_QUEUE_URL=${SQS_CAPTION_QUEUE_URL:-}
      - SQS_STT_QUEUE_URL=${SQS_STT_QUEUE_URL:-}
      - SQS_OCR_QUEUE_URL=${SQS_OCR_QUEUE_URL:-}
      - SQS_TRANSCODE_QUEUE_URL=${SQS_TRANSCODE_QUEUE_URL:-}
      - SQS_FACE_QUEUE_URL=${SQS_FACE_QUEUE_URL:-}
      # GPU transcode mode (cpu=local ffmpeg, gpu=S3+SQS+NVENC)
      - DRIVE_TRANSCODE_MODE=${DRIVE_TRANSCODE_MODE:-cpu}
      # Dev features
      - ENABLE_DEV_REFRESH=${ENABLE_DEV_REFRESH:-true}
      # Drive internal ingest key (shared with drive-worker)
      - DRIVE_CONNECTOR_ENABLED=${DRIVE_CONNECTOR_ENABLED:-false}
      - FOLDER_SYNC_V2_ENABLED=${FOLDER_SYNC_V2_ENABLED:-true}
      - DRIVE_INTERNAL_API_KEY=${DRIVE_INTERNAL_API_KEY:-}
      - DRIVE_SA_ENCRYPTION_KEY=${DRIVE_SA_ENCRYPTION_KEY:-}
      - DRIVE_S3_BUCKET=${DRIVE_S3_BUCKET:-heimdex-drive}
      - S3_REGION=${S3_REGION:-ap-northeast-2}
      # Google Drive OAuth (folder-scoped sync)
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET:-}
      - GOOGLE_OAUTH_REDIRECT_URI=${GOOGLE_OAUTH_REDIRECT_URI:-}
      # Closed-vocabulary VMD search
      - CLOSED_VOCAB_ENABLED=${CLOSED_VOCAB_ENABLED:-false}
      - CLOSED_VOCAB_SERVICE_URL=${CLOSED_VOCAB_SERVICE_URL:-http://closed-vocab-search:8080}
      - CLOSED_VOCAB_TIMEOUT_MS=${CLOSED_VOCAB_TIMEOUT_MS:-1000}
      # Visual embedding (SigLIP2 query-time text encoder)
      - VISUAL_EMBEDDING_ENABLED=${VISUAL_EMBEDDING_ENABLED:-false}
      - SQS_VISUAL_EMBED_QUEUE_URL=${SQS_VISUAL_EMBED_QUEUE_URL:-}
      - SQS_EXPORT_QUEUE_URL=${SQS_EXPORT_QUEUE_URL:-}
      - SQS_SHORTS_RENDER_QUEUE_URL=${SQS_SHORTS_RENDER_QUEUE_URL:-}
      - SQS_BLUR_QUEUE_URL=${SQS_BLUR_QUEUE_URL:-}
      - SQS_PRODUCT_ENUMERATE_QUEUE_URL=${SQS_PRODUCT_ENUMERATE_QUEUE_URL:-}
      - SQS_PRODUCT_TRACK_QUEUE_URL=${SQS_PRODUCT_TRACK_QUEUE_URL:-}
      # PII blur (user-triggered, see app/modules/blur/)
      - BLUR_ENABLED=${BLUR_ENABLED:-false}
      # BLUR_EXPORT_ENABLED gates the v0.10 ProRes 4444 layer export
      # workflow (POST /api/blur/jobs/{id}/export). Stays dark until
      # drive-blur-worker is on the dispatcher build AND contracts
      # v0.10.0 is published to PyPI.
      - BLUR_EXPORT_ENABLED=${BLUR_EXPORT_ENABLED:-false}
      - BLUR_MAX_ACTIVE_PER_ORG=${BLUR_MAX_ACTIVE_PER_ORG:-5}
      - BLUR_LEASE_SECONDS=${BLUR_LEASE_SECONDS:-1800}
      # Auto-shorts (mode-aware AI clip selection over the existing
      # shorts render pipeline). Router 404s while AUTO_SHORTS_ENABLED
      # is false so the feature ships dark.
      - AUTO_SHORTS_ENABLED=${AUTO_SHORTS_ENABLED:-false}
      - AUTO_SHORTS_RATE_LIMIT_PER_HOUR=${AUTO_SHORTS_RATE_LIMIT_PER_HOUR:-10}
      - AUTO_SHORTS_MIN_VIDEO_DURATION_SEC=${AUTO_SHORTS_MIN_VIDEO_DURATION_SEC:-300}
      # Auto-shorts LLM scorer (Option C from
      # .claude/plans/shorts-auto-llm-selection.md). All flags default-off;
      # staging flips AUTO_SHORTS_LLM_ENABLED=true + rollout_pct=100 via .env.
      # Service falls back to the pure scorer on any LLM defect, so the
      # flag flip is safe even before the Aircloud OpenAI quota is sized.
      - AUTO_SHORTS_LLM_ENABLED=${AUTO_SHORTS_LLM_ENABLED:-false}
      - AUTO_SHORTS_LLM_MODEL=${AUTO_SHORTS_LLM_MODEL:-gpt-4o-mini}
      - AUTO_SHORTS_LLM_MAX_SCENES=${AUTO_SHORTS_LLM_MAX_SCENES:-50}
      - AUTO_SHORTS_LLM_DAILY_BUDGET_USD=${AUTO_SHORTS_LLM_DAILY_BUDGET_USD:-25.0}
      - AUTO_SHORTS_LLM_ESTIMATED_COST_PER_CALL_USD=${AUTO_SHORTS_LLM_ESTIMATED_COST_PER_CALL_USD:-0.003}
      - AUTO_SHORTS_LLM_TIMEOUT_SEC=${AUTO_SHORTS_LLM_TIMEOUT_SEC:-8.0}
      - AUTO_SHORTS_LLM_ROLLOUT_PCT=${AUTO_SHORTS_LLM_ROLLOUT_PCT:-0}
      - AUTO_SHORTS_LLM_PROMPT_VERSION=${AUTO_SHORTS_LLM_PROMPT_VERSION:-2026-04-24-v1}
      - BLUR_DAILY_BUDGET_USD_PER_ORG=${BLUR_DAILY_BUDGET_USD_PER_ORG:-50.0}
      # Aircloud GPU worker orchestration
      - AIRCLOUD_ENABLED=${AIRCLOUD_ENABLED:-false}
      - AIRCLOUD_API_KEY=${AIRCLOUD_API_KEY:-}
      - AIRCLOUD_ENDPOINT_TRANSCODE=${AIRCLOUD_ENDPOINT_TRANSCODE:-}
      - AIRCLOUD_ENDPOINT_CAPTION=${AIRCLOUD_ENDPOINT_CAPTION:-}
      - AIRCLOUD_ENDPOINT_STT=${AIRCLOUD_ENDPOINT_STT:-}
      - AIRCLOUD_ENDPOINT_OCR=${AIRCLOUD_ENDPOINT_OCR:-}
      - AIRCLOUD_ENDPOINT_FACE=${AIRCLOUD_ENDPOINT_FACE:-}
      - AIRCLOUD_ENDPOINT_VISUAL_EMBED=${AIRCLOUD_ENDPOINT_VISUAL_EMBED:-}
      - AIRCLOUD_ENDPOINT_BLUR=${AIRCLOUD_ENDPOINT_BLUR:-}
      - AIRCLOUD_ENDPOINT_PRODUCT_ENUMERATE=${AIRCLOUD_ENDPOINT_PRODUCT_ENUMERATE:-}
      - AIRCLOUD_ENDPOINT_PRODUCT_TRACK=${AIRCLOUD_ENDPOINT_PRODUCT_TRACK:-}
      - AIRCLOUD_WAKE_DEBOUNCE_SECONDS=${AIRCLOUD_WAKE_DEBOUNCE_SECONDS:-300}
      - AIRCLOUD_COOLDOWN_CHECKS=${AIRCLOUD_COOLDOWN_CHECKS:-3}
      # Export settings
      - EXPORT_MAX_SIZE_BYTES=${EXPORT_MAX_SIZE_BYTES:-2147483648}
      - EXPORT_MAX_CLIPS=${EXPORT_MAX_CLIPS:-100}
      - EXPORT_MAX_PROXIES=${EXPORT_MAX_PROXIES:-20}
      - EXPORT_EXPIRY_DAYS=${EXPORT_EXPIRY_DAYS:-3}
      - ANALYTICS_ENABLED=${ANALYTICS_ENABLED:-true}
      - ANALYTICS_EXPORT_ENABLED=${ANALYTICS_EXPORT_ENABLED:-false}
      - ANALYTICS_S3_BUCKET=${ANALYTICS_S3_BUCKET:-}
      - ANALYTICS_S3_PREFIX=${ANALYTICS_S3_PREFIX:-analytics}
      - ANALYTICS_BQ_ENABLED=${ANALYTICS_BQ_ENABLED:-false}
      - ANALYTICS_BQ_PROJECT=${ANALYTICS_BQ_PROJECT:-}
      - ANALYTICS_BQ_DATASET=${ANALYTICS_BQ_DATASET:-search_analytics}
      - YOUTUBE_ENABLED=${YOUTUBE_ENABLED:-false}
      - YOUTUBE_S3_BUCKET=${YOUTUBE_S3_BUCKET:-}
      - HF_HOME=/home/appuser/.cache/huggingface
    ports:
      - "8000:8000"
    volumes:
      - ./services/api:/app
      # Mount heimdex-media-contracts for runtime import (shorts scorer, scene schemas)
      - ../heimdex-media-contracts:/opt/heimdex-media-contracts:ro
      # Persistent volume for HuggingFace model cache (~2.4GB for multilingual-e5-large)
      - huggingface_cache:/home/appuser/.cache/huggingface
      # Persistent storage for uploaded scene/face thumbnails
      - ./thumbnails:/data/thumbnails
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    command: >
      sh -c "pip install --no-deps -e /opt/heimdex-media-contracts 2>/dev/null;
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*' --reload"

