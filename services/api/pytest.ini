[pytest]
markers =
    core: fast, hermetic product behavior safe for the default PR gate
    contract: shared API/schema/message-shape contract tests
    integration: marks tests as integration tests (deselect with '-m "not integration"')
    quality: marks tests as quality evaluation tests (require seeded data)
    external: tests that touch staging, cloud services, Auth0, AWS, or other non-hermetic resources
    slow: valid but expensive tests that should run on scheduled/manual lanes
    legacy: retained temporarily for old supported rollback paths; excluded from default PR gate once classified
    deprecated: historical tests awaiting rewrite or deletion; must have a cleanup-ledger entry
# Default: skip integration + quality tests.
# Integration tests require docker compose services (minio, opensearch, SQS).
# Quality tests require seeded data.
# Override locally with `pytest -m integration` or `pytest -m ""` to run everything.
addopts = -m "not integration and not quality"
