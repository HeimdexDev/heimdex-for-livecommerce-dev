name: Build GPU Worker Images

# Trigger manually or on changes to GPU Dockerfiles / worker code
on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'Workers to build (comma-separated: caption,stt,ocr,transcode,face,visual-embed,reranker,blur,product-enumerate,product-track or "all")'
        required: false
        default: 'all'
      contracts_ref:
        description: 'Branch / tag / SHA of heimdex-media-contracts to check out (default: main). Use a feature branch when building against an unmerged contracts change.'
        required: false
        default: 'main'
      pipelines_ref:
        description: 'Branch / tag / SHA of heimdex-media-pipelines to check out (default: main). Use a feature branch when building against an unmerged pipelines change (e.g., a new ML library lands here before its consumer worker).'
        required: false
        default: 'main'
  push:
    branches: [main]
    paths:
      - 'services/drive-caption-worker/**'
      - 'services/drive-stt-worker/**'
      - 'services/drive-ocr-worker/**'
      - 'services/drive-transcode-worker/**'
      - 'services/drive-face-worker/**'
      - 'services/drive-visual-embed-worker/**'
      - 'services/drive-reranker-worker/**'
      - 'services/drive-blur-worker/**'
      # shorts-auto product mode v2 workers (Phase 2+).
      # No `drive-` prefix — these workers run after ingest, not during.
      - 'services/product-enumerate-worker/**'
      - 'services/product-track-worker/**'

env:
  REGISTRY: ghcr.io
  # IMAGE_PREFIX is computed per-job by the "Normalize image prefix" step below.
  # OCI / Docker registry refs require all-lowercase repository names, but
  # `github.repository_owner` preserves the org's mixed-case form (e.g. HeimdexDev).
  # Pre-2026-05-13 the owner was already lowercase (`jlee-heimdex`) so a static env
  # worked; post-org-migration we lowercase it dynamically so future owner renames
  # don't silently break the build.

jobs:
  # ── Step 1: Detect which workers actually changed ─────────────────────────
  detect-changes:
    name: Detect changed workers
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.resolve.outputs.workers }}
    steps:
      - name: Checkout SaaS repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # Need parent commit for diff

      - name: Resolve workers to build
        id: resolve
        run: |
          ALL_WORKERS='["caption","stt","ocr","transcode","face","visual-embed","reranker","blur","product-enumerate","product-track"]'

          # ── Manual trigger: use input directly ──
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.workers }}"
            if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
              echo "workers=$ALL_WORKERS" >> "$GITHUB_OUTPUT"
              echo "Manual trigger: building ALL workers"
            else
              # Convert comma-separated input to JSON array
              JSON=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R . | jq -sc .)
              echo "workers=$JSON" >> "$GITHUB_OUTPUT"
              echo "Manual trigger: building $INPUT"
            fi
            exit 0
          fi

          # ── Push trigger: detect changed paths via git diff ──
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "workers=$ALL_WORKERS" >> "$GITHUB_OUTPUT"
            echo "No parent commit (first push?): building ALL workers"
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED"
          echo ""

          WORKERS=()

          # Check each worker directory
          echo "$CHANGED" | grep -q '^services/drive-caption-worker/'      && WORKERS+=("caption")
          echo "$CHANGED" | grep -q '^services/drive-stt-worker/'          && WORKERS+=("stt")
          echo "$CHANGED" | grep -q '^services/drive-ocr-worker/'          && WORKERS+=("ocr")
          echo "$CHANGED" | grep -q '^services/drive-transcode-worker/'    && WORKERS+=("transcode")
          echo "$CHANGED" | grep -q '^services/drive-face-worker/'         && WORKERS+=("face")
          echo "$CHANGED" | grep -q '^services/drive-visual-embed-worker/' && WORKERS+=("visual-embed")
          echo "$CHANGED" | grep -q '^services/drive-reranker-worker/'     && WORKERS+=("reranker")
          echo "$CHANGED" | grep -q '^services/drive-blur-worker/'        && WORKERS+=("blur")
          # shorts-auto product mode v2 workers — no `drive-` prefix.
          echo "$CHANGED" | grep -q '^services/product-enumerate-worker/' && WORKERS+=("product-enumerate")
          echo "$CHANGED" | grep -q '^services/product-track-worker/'     && WORKERS+=("product-track")

          if [ ${#WORKERS[@]} -eq 0 ]; then
            echo "workers=[]" >> "$GITHUB_OUTPUT"
            echo "No worker directories changed — skipping all builds"
          else
            JSON=$(printf '%s\n' "${WORKERS[@]}" | jq -R . | jq -sc .)
            echo "workers=$JSON" >> "$GITHUB_OUTPUT"
            echo "Building: ${WORKERS[*]}"
          fi

  # ── Step 2: Build only the workers that changed ───────────────────────────
  build-and-push:
    name: Build ${{ matrix.worker }} GPU image
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.workers != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        worker: ${{ fromJSON(needs.detect-changes.outputs.workers) }}
      fail-fast: false
    steps:
      - name: Normalize image prefix
        # OCI refs must be lowercase; `github.repository_owner` may be mixed-case.
        run: echo "IMAGE_PREFIX=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/heimdex" >> "$GITHUB_ENV"

      # Checkout ALL repos (SaaS + contracts + pipelines) into correct layout
      - name: Checkout SaaS repo
        uses: actions/checkout@v4
        with:
          path: dev-heimdex-for-livecommerce

      - name: Checkout media-contracts
        uses: actions/checkout@v4
        with:
          repository: HeimdexDev/heimdex-media-contracts
          path: heimdex-media-contracts
          # ``contracts_ref`` defaults to ``main``. Override via
          # workflow_dispatch when building against an unmerged
          # contracts change. Push triggers always use ``main``.
          ref: ${{ github.event.inputs.contracts_ref || 'main' }}

      - name: Checkout media-pipelines
        uses: actions/checkout@v4
        with:
          repository: HeimdexDev/heimdex-media-pipelines
          path: heimdex-media-pipelines
          # ``pipelines_ref`` defaults to ``main``. Override via
          # workflow_dispatch for cross-repo feature work — e.g.,
          # building product-enumerate-worker before pipelines
          # ``feat/product-enum-shorts-auto-v2`` is merged.
          ref: ${{ github.event.inputs.pipelines_ref || 'main' }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.worker }} GPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Product mode v2 workers (Phase 2+) live in services/{worker}-worker/
          # without the `drive-` prefix; everything else preserves the
          # legacy services/drive-{worker}-worker/ layout.
          file: ${{ startsWith(matrix.worker, 'product-') && format('dev-heimdex-for-livecommerce/services/{0}-worker/Dockerfile.gpu', matrix.worker) || format('dev-heimdex-for-livecommerce/services/drive-{0}-worker/Dockerfile.gpu', matrix.worker) }}
          push: true
          # Suppress BuildKit provenance/SBOM attestations. They produce a second
          # `unknown/unknown` manifest in the OCI image index, which breaks
          # Aircloud's /prepare_github_container_registry_image parser with
          # `list index out of range` (incident 2026-04-28). Re-enable once
          # Aircloud's prep service handles OCI image indexes correctly.
          provenance: false
          sbom: false
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.worker }}-worker-gpu:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.worker }}-worker-gpu:${{ github.sha }}
          secrets: |
            hf_token=${{ secrets.HF_TOKEN }}
          cache-from: type=gha,scope=${{ matrix.worker }}
          cache-to: type=gha,scope=${{ matrix.worker }},mode=max

      - name: Verify image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.worker }}-worker-gpu:${{ github.sha }}
          echo "✅ ${{ matrix.worker }}-worker-gpu image verified"
