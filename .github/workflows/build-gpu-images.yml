name: Build GPU Worker Images

# Trigger manually or on changes to GPU Dockerfiles / worker code
on:
  workflow_dispatch:
    inputs:
      workers:
        description: 'Workers to build (comma-separated: caption,stt,ocr,transcode,face,visual-embed or "all")'
        required: false
        default: 'all'
  push:
    branches: [main]
    paths:
      - 'services/drive-caption-worker/**'
      - 'services/drive-stt-worker/**'
      - 'services/drive-ocr-worker/**'
      - 'services/drive-transcode-worker/**'
      - 'services/drive-face-worker/**'
      - 'services/drive-visual-embed-worker/**'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/heimdex

jobs:
  # ── Step 1: Detect which workers actually changed ─────────────────────────
  detect-changes:
    name: Detect changed workers
    runs-on: ubuntu-latest
    outputs:
      workers: ${{ steps.resolve.outputs.workers }}
    steps:
      - name: Checkout SaaS repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2   # Need parent commit for diff

      - name: Resolve workers to build
        id: resolve
        run: |
          ALL_WORKERS='["caption","stt","ocr","transcode","face","visual-embed"]'

          # ── Manual trigger: use input directly ──
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            INPUT="${{ github.event.inputs.workers }}"
            if [ "$INPUT" = "all" ] || [ -z "$INPUT" ]; then
              echo "workers=$ALL_WORKERS" >> "$GITHUB_OUTPUT"
              echo "Manual trigger: building ALL workers"
            else
              # Convert comma-separated input to JSON array
              JSON=$(echo "$INPUT" | tr ',' '\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | jq -R . | jq -sc .)
              echo "workers=$JSON" >> "$GITHUB_OUTPUT"
              echo "Manual trigger: building $INPUT"
            fi
            exit 0
          fi

          # ── Push trigger: detect changed paths via git diff ──
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "workers=$ALL_WORKERS" >> "$GITHUB_OUTPUT"
            echo "No parent commit (first push?): building ALL workers"
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED"
          echo ""

          WORKERS=()

          # Check each worker directory
          echo "$CHANGED" | grep -q '^services/drive-caption-worker/'      && WORKERS+=("caption")
          echo "$CHANGED" | grep -q '^services/drive-stt-worker/'          && WORKERS+=("stt")
          echo "$CHANGED" | grep -q '^services/drive-ocr-worker/'          && WORKERS+=("ocr")
          echo "$CHANGED" | grep -q '^services/drive-transcode-worker/'    && WORKERS+=("transcode")
          echo "$CHANGED" | grep -q '^services/drive-face-worker/'         && WORKERS+=("face")
          echo "$CHANGED" | grep -q '^services/drive-visual-embed-worker/' && WORKERS+=("visual-embed")

          if [ ${#WORKERS[@]} -eq 0 ]; then
            echo "workers=[]" >> "$GITHUB_OUTPUT"
            echo "No worker directories changed — skipping all builds"
          else
            JSON=$(printf '%s\n' "${WORKERS[@]}" | jq -R . | jq -sc .)
            echo "workers=$JSON" >> "$GITHUB_OUTPUT"
            echo "Building: ${WORKERS[*]}"
          fi

  # ── Step 2: Build only the workers that changed ───────────────────────────
  build-and-push:
    name: Build ${{ matrix.worker }} GPU image
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.workers != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        worker: ${{ fromJSON(needs.detect-changes.outputs.workers) }}
      fail-fast: false
    steps:
      # Checkout ALL repos (SaaS + contracts + pipelines) into correct layout
      - name: Checkout SaaS repo
        uses: actions/checkout@v4
        with:
          path: dev-heimdex-for-livecommerce

      - name: Checkout media-contracts
        uses: actions/checkout@v4
        with:
          repository: jlee-heimdex/heimdex-media-contracts
          path: heimdex-media-contracts

      - name: Checkout media-pipelines
        uses: actions/checkout@v4
        with:
          repository: jlee-heimdex/heimdex-media-pipelines
          path: heimdex-media-pipelines

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.worker }} GPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: dev-heimdex-for-livecommerce/services/drive-${{ matrix.worker }}-worker/Dockerfile.gpu
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.worker }}-worker-gpu:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.worker }}-worker-gpu:${{ github.sha }}
          secrets: |
            hf_token=${{ secrets.HF_TOKEN }}
          cache-from: type=gha,scope=${{ matrix.worker }}
          cache-to: type=gha,scope=${{ matrix.worker }},mode=max

      - name: Verify image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.worker }}-worker-gpu:${{ github.sha }}
          echo "✅ ${{ matrix.worker }}-worker-gpu image verified"
