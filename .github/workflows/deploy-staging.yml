name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to staging EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ec2-user
          key: ${{ secrets.STAGING_SSH_KEY }}
          command_timeout: 12m
          # script_stop: true breaks if/else — drone-ssh injects $? checks per-line
          script: |
            set -euo pipefail

            APP_DIR=/opt/heimdex/dev-heimdex-for-livecommerce
            CONTRACTS_DIR=/opt/heimdex/heimdex-media-contracts
            PIPELINES_DIR=/opt/heimdex/heimdex-media-pipelines
            WORKER_SDK_DIR=/opt/heimdex/heimdex-worker-sdk
            LOG=/opt/heimdex/logs/deploy-$(date +%Y%m%d-%H%M%S).log

            exec > >(tee -a "$LOG") 2>&1
            echo "=== Deploy started at $(date) ==="

            # ---- Capture pre-deploy SHA (before pull) for accurate change detection ----
            cd "$APP_DIR"
            PREV=$(git rev-parse HEAD 2>/dev/null || echo "")

            # ---- Sync repos (force fetch to avoid stale ref locks) ----
            echo "--- git pull (app) ---"
            git remote prune origin 2>/dev/null || true
            git fetch origin main --force
            git reset --hard origin/main

            echo "--- git pull (contracts) ---"
            cd "$CONTRACTS_DIR"
            git remote prune origin 2>/dev/null || true
            git fetch origin main --force
            git reset --hard origin/main

            echo "--- git pull (pipelines) ---"
            cd "$PIPELINES_DIR"
            git remote prune origin 2>/dev/null || true
            git fetch origin main --force
            git reset --hard origin/main

            # heimdex-worker-sdk shadows the Dockerfile pip pin via the
            # docker-compose.override.yml editable mount on staging
            # (drive-worker / drive-ocr-worker / drive-blur-worker etc.).
            # Without this pull, a freshly-tagged + published SDK never
            # reaches those workers — the Dockerfile bump alone has no
            # effect because the mount overrides it. WORKER_CHANGED on
            # subsequent restart picks up the new editable install.
            if [ -d "$WORKER_SDK_DIR/.git" ]; then
              echo "--- git pull (worker-sdk) ---"
              cd "$WORKER_SDK_DIR"
              git remote prune origin 2>/dev/null || true
              git fetch origin main --force
              git reset --hard origin/main
            fi

            cd "$APP_DIR"

            # ---- Detect what changed (PREV=pre-pull SHA, CURR=post-pull SHA) ----
            CURR=$(git rev-parse HEAD)
            API_CHANGED=false
            WEB_CHANGED=false
            WORKER_CHANGED=false
            YOUTUBE_CHANGED=false
            SHORTS_CHANGED=false

            if [ -n "$PREV" ] && [ "$PREV" != "$CURR" ]; then
              DIFF_FILES=$(git diff --name-only "$PREV" "$CURR" || true)

              # Use if-statements to avoid pipefail + set -e interaction
              if echo "$DIFF_FILES" | grep -qE '^services/api/'; then API_CHANGED=true; fi
              if echo "$DIFF_FILES" | grep -q '^services/web/'; then WEB_CHANGED=true; fi
              if echo "$DIFF_FILES" | grep -qE '^services/drive-worker/'; then WORKER_CHANGED=true; fi
              if echo "$DIFF_FILES" | grep -qE '^services/youtube-worker/'; then YOUTUBE_CHANGED=true; fi
              if echo "$DIFF_FILES" | grep -qE '^services/shorts-render-worker/'; then SHORTS_CHANGED=true; fi

              # Shared config changes trigger all
              if echo "$DIFF_FILES" | grep -qE '^(docker-compose\.yml|\.env\.example)'; then API_CHANGED=true; WEB_CHANGED=true; WORKER_CHANGED=true; YOUTUBE_CHANGED=true; SHORTS_CHANGED=true; fi

              # Self-healing: if deploy script changed, force full rebuild
              if echo "$DIFF_FILES" | grep -qE '^\.github/workflows/deploy'; then API_CHANGED=true; WEB_CHANGED=true; WORKER_CHANGED=true; YOUTUBE_CHANGED=true; SHORTS_CHANGED=true; fi
            elif [ -z "$PREV" ]; then
              API_CHANGED=true
              WEB_CHANGED=true
              WORKER_CHANGED=true
              YOUTUBE_CHANGED=true
              SHORTS_CHANGED=true
            fi

            echo "API changed: $API_CHANGED | Web changed: $WEB_CHANGED | Worker changed: $WORKER_CHANGED | YouTube changed: $YOUTUBE_CHANGED | Shorts changed: $SHORTS_CHANGED"

            # ---- Build changed services ----
            if [ "$API_CHANGED" = true ]; then
              echo "--- building api ---"
              docker compose build api
            fi

            if [ "$WEB_CHANGED" = true ]; then
              echo "--- building web ---"
              docker compose build web
            fi

            if [ "$WORKER_CHANGED" = true ]; then
              echo "--- building drive-worker ---"
              docker compose build drive-worker
            fi

            if [ "$SHORTS_CHANGED" = true ]; then
              echo "--- building shorts-render-worker ---"
              docker compose build shorts-render-worker
            fi

            # YouTube worker uses --profile youtube; only build if running
            if [ "$YOUTUBE_CHANGED" = true ]; then
              YT_STATUS=$(docker inspect --format='{{.State.Status}}' heimdex-youtube-worker 2>/dev/null || echo "not_found")
              if [ "$YT_STATUS" = "running" ]; then
                echo "--- building youtube-worker ---"
                docker compose --profile youtube build youtube-worker
              else
                echo "--- youtube-worker not running, skipping build ---"
                YOUTUBE_CHANGED=false
              fi
            fi

            # ---- Ensure all services are up before migrations ----
            echo "--- ensuring services are up ---"
            docker compose up -d
            sleep 10

            # ---- Run migrations ----
            if [ "$API_CHANGED" = true ]; then
              echo "--- running migrations ---"
              docker compose run --rm -T --no-deps api alembic upgrade head
            fi

            # ---- Restart changed services ----
            if [ "$API_CHANGED" = true ]; then
              echo "--- restarting api ---"
              docker compose up -d --no-deps api
              sleep 10
            fi

            if [ "$WORKER_CHANGED" = true ]; then
              echo "--- restarting drive-worker ---"
              docker compose up -d --no-deps drive-worker
              sleep 5
            fi

            if [ "$YOUTUBE_CHANGED" = true ]; then
              echo "--- restarting youtube-worker ---"
              docker compose --profile youtube up -d --no-deps youtube-worker
              sleep 5
            fi

            if [ "$SHORTS_CHANGED" = true ]; then
              echo "--- restarting shorts-render-worker ---"
              docker compose up -d --no-deps shorts-render-worker
              sleep 5
            fi

            if [ "$WEB_CHANGED" = true ]; then
              echo "--- restarting web ---"
              docker compose up -d --no-deps --force-recreate -V web
              sleep 5
            fi

            # Enrichment workers (STT, OCR, Caption) run on Aircloud+ GPU since 2026-02-26.
            # EC2 no longer builds or restarts them. See docs/housekeeping/01_cleanup_plan.md.

            # ---- Health checks (retry loop — Next.js cold start can take 30s+) ----
            echo "--- health checks ---"
            FAIL=0
            MAX_ATTEMPTS=20
            INTERVAL=3

            echo "Waiting for API (max ${MAX_ATTEMPTS}x${INTERVAL}s)..."
            API_OK=false
            for i in $(seq 1 $MAX_ATTEMPTS); do
              API_STATUS=$(curl -sf --max-time 5 http://localhost:8000/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','UNKNOWN'))" 2>/dev/null || echo "DOWN")
              if [ "$API_STATUS" = "ok" ]; then
                echo "API: OK (attempt $i)"
                API_OK=true
                break
              fi
              echo "API: not ready (attempt $i/$MAX_ATTEMPTS, status=$API_STATUS)"
              sleep $INTERVAL
            done
            if [ "$API_OK" = false ]; then
              echo "API: FAILED after $MAX_ATTEMPTS attempts"
              FAIL=1
            fi

            echo "Waiting for Web (max ${MAX_ATTEMPTS}x${INTERVAL}s)..."
            WEB_OK=false
            for i in $(seq 1 $MAX_ATTEMPTS); do
              WEB_CODE=$(curl -sf -o /dev/null -w '%{http_code}' --max-time 5 http://localhost:3000 || echo "000")
              if [ "${WEB_CODE}" -ge 200 ] && [ "${WEB_CODE}" -lt 400 ]; then
                echo "Web: OK (HTTP $WEB_CODE, attempt $i)"
                WEB_OK=true
                break
              fi
              echo "Web: not ready (attempt $i/$MAX_ATTEMPTS, code=$WEB_CODE)"
              sleep $INTERVAL
            done
            if [ "$WEB_OK" = false ]; then
              echo "Web: FAILED after $MAX_ATTEMPTS attempts"
              FAIL=1
            fi

            echo "Checking drive-worker..."
            DW_STATUS=$(docker inspect --format='{{.State.Status}}' heimdex-drive-worker 2>/dev/null || echo "not_found")
            if [ "$DW_STATUS" = "running" ]; then
              echo "drive-worker: OK"
            else
              echo "drive-worker: $DW_STATUS"
              docker logs --tail 20 heimdex-drive-worker 2>&1 || true
              FAIL=1
            fi

            # ---- Docker cleanup (prevent disk bloat across deploys) ----
            echo "--- docker cleanup ---"
            docker image prune -f || true
            docker volume prune -f || true
            docker builder prune -f --keep-storage=5G || true
            echo "Disk after cleanup: $(df -h / | tail -1)"

            echo "=== Deploy finished at $(date) | commit=$CURR | status=$([ $FAIL -eq 0 ] && echo 'SUCCESS' || echo 'DEGRADED') ==="

            exit $FAIL
