name: Deploy Staging

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to staging EC2
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ec2-user
          key: ${{ secrets.STAGING_SSH_KEY }}
          script_stop: true
          command_timeout: 12m
          script: |
            set -euo pipefail

            APP_DIR=/opt/heimdex/dev-heimdex-for-livecommerce
            CONTRACTS_DIR=/opt/heimdex/heimdex-media-contracts
            PIPELINES_DIR=/opt/heimdex/heimdex-media-pipelines
            LOG=/opt/heimdex/logs/deploy-$(date +%Y%m%d-%H%M%S).log

            exec > >(tee -a "$LOG") 2>&1
            echo "=== Deploy started at $(date) ==="

            # ---- Sync all repos (force refspec to avoid stale ref locks) ----
            for REPO_DIR in "$APP_DIR" "$CONTRACTS_DIR" "$PIPELINES_DIR"; do
              echo "--- git pull: $REPO_DIR ---"
              cd "$REPO_DIR"
              git remote prune origin 2>/dev/null || true
              git fetch origin +refs/heads/main:refs/remotes/origin/main
              PREV_HEAD=$(git rev-parse HEAD)
              git reset --hard origin/main
              NEW_HEAD=$(git rev-parse HEAD)
              if [ "$PREV_HEAD" = "$NEW_HEAD" ]; then
                echo "  (no changes)"
              else
                echo "  $PREV_HEAD -> $NEW_HEAD"
              fi
            done

            cd "$APP_DIR"

            # ---- Detect what changed ----
            PREV=$(git rev-parse HEAD~1 2>/dev/null || echo "")
            CURR=$(git rev-parse HEAD)
            API_CHANGED=false
            WEB_CHANGED=false
            WORKER_CHANGED=false

            if [ -n "$PREV" ]; then
              DIFF_FILES=$(git diff --name-only "$PREV" "$CURR")
              echo "$DIFF_FILES" | grep -q '^services/api/' && API_CHANGED=true || true
              echo "$DIFF_FILES" | grep -q '^services/web/' && WEB_CHANGED=true || true
              echo "$DIFF_FILES" | grep -q '^services/drive-caption-worker/' && WORKER_CHANGED=true || true
              echo "$DIFF_FILES" | grep -qE '^(docker-compose\.yml|\.env\.example)' && { API_CHANGED=true; WEB_CHANGED=true; WORKER_CHANGED=true; } || true
            else
              API_CHANGED=true
              WEB_CHANGED=true
              WORKER_CHANGED=true
            fi

            echo "API changed: $API_CHANGED | Web changed: $WEB_CHANGED | Worker changed: $WORKER_CHANGED"

            # ---- Build changed services ----
            if [ "$API_CHANGED" = true ]; then
              echo "--- building api ---"
              docker compose build api
            fi

            if [ "$WEB_CHANGED" = true ]; then
              echo "--- building web ---"
              docker compose build web
            fi

            # ---- Ensure all services are up before migrations ----
            echo "--- ensuring services are up ---"
            docker compose up -d
            sleep 10

            # ---- Run migrations ----
            if [ "$API_CHANGED" = true ]; then
              echo "--- running migrations ---"
              docker compose run --rm -T --no-deps api alembic upgrade head
            fi

            # ---- Restart changed services ----
            if [ "$API_CHANGED" = true ]; then
              echo "--- restarting api ---"
              docker compose up -d --no-deps api
              sleep 10
            fi

            if [ "$WEB_CHANGED" = true ]; then
              echo "--- restarting web ---"
              docker compose up -d --no-deps --force-recreate -V web
              sleep 5
            fi

            if [ "$WORKER_CHANGED" = true ]; then
              echo "--- restarting drive-caption-worker ---"
              docker compose restart drive-caption-worker
              sleep 5
            fi

            # ---- Health checks ----
            echo "--- health checks ---"
            FAIL=0

            API_STATUS=$(curl -sf http://localhost:8000/health | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','UNKNOWN'))" 2>/dev/null || echo "DOWN")
            if [ "$API_STATUS" = "ok" ]; then
              echo "API: OK"
            else
              echo "API: FAILED ($API_STATUS)"
              FAIL=1
            fi

            WEB_CODE=$(curl -sf -o /dev/null -w '%{http_code}' --max-time 10 http://localhost:3000 || echo "000")
            if [ "${WEB_CODE}" -ge 200 ] && [ "${WEB_CODE}" -lt 400 ]; then
              echo "Web: OK (HTTP $WEB_CODE)"
            else
              echo "Web: FAILED (HTTP $WEB_CODE)"
              FAIL=1
            fi

            echo "=== Deploy finished at $(date) | commit=$CURR | status=$([ $FAIL -eq 0 ] && echo 'SUCCESS' || echo 'DEGRADED') ==="

            exit $FAIL
