name: Search Quality Guardrail

on:
  pull_request:
    paths:
      - "services/api/app/modules/search/**"
      - "services/api/app/modules/ingest/**"
      - "services/api/app/config.py"
      - "services/api/scripts/**"
      - "services/api/tests/test_search_eval.py"
      - "services/api/tests/test_scene_client.py"
      - "services/api/tests/test_scene_ingest.py"
      - "services/api/tests/test_search_quality.py"
      - "services/api/tests/test_normalize.py"
      - ".github/workflows/search-quality.yml"

jobs:
  unit-tests:
    name: Search quality unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync

      - name: Run search-specific unit tests
        run: >
          uv run pytest
          tests/test_scene_client.py
          tests/test_search_eval.py
          tests/test_search_quality.py
          tests/test_scene_ingest.py
          -m "not integration and not quality"
          -v --tb=short

      - name: Run full unit suite (non-integration)
        run: uv run pytest tests/ -k "not integration and not quality" --tb=short
