name: Worker DB Coupling Guardrail

on:
  pull_request:
    paths:
      - "services/drive-worker/**"
      - "services/drive-caption-worker/**"
      - "services/drive-stt-worker/**"
      - "services/drive-ocr-worker/**"
      - "services/worker_sdk/**"
      - "docker-compose.yml"
      - "scripts/check_no_worker_db_coupling.sh"
      - ".github/workflows/worker-coupling-check.yml"

jobs:
  check-coupling:
    name: No worker DB coupling
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4

      - name: Run coupling guardrail
        run: bash scripts/check_no_worker_db_coupling.sh
